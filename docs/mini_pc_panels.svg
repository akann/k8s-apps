<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Mini PC front and rear panel diagram</title>
  <desc>Front panel showing power button, status LEDs, audio jack, USB 3.2 ports, and vent grille. Rear panel showing PCIe slot, dual 10G SFP+, dual 2.5G RJ45, USB4, HDMI, USB 3.2, USB 2.0, DC-in, and exhaust fan grille. Dimensions: 197 × 168 × 62 mm.</desc>
  <style>
    text { font-family: ui-sans-serif, system-ui, sans-serif; fill: #3d3d3a; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; }
    .box-fill { fill: #f1efe8; stroke: #888780; }
    .panel { fill: #f8f7f4; stroke: #5f5e5a; }
    .c-teal  { fill: #9fe1cb; stroke: #0f6e56; }
    .c-amber { fill: #fac775; stroke: #ba7517; }
    .c-blue  { fill: #b5d4f4; stroke: #185fa5; }
    .c-gray  { fill: #d3d1c7; stroke: #5f5e5a; }
    .c-purple{ fill: #cecbf6; stroke: #534ab7; }
    .c-coral { fill: #f5c4b3; stroke: #993c1d; }
    .label   { fill: #5f5e5a; }
    .dim     { fill: #888780; }
    .grid    { stroke: #b4b2a9; stroke-width: 0.5; }
    .dim-line{ stroke: #b4b2a9; stroke-width: 0.5; stroke-dasharray: 3 3; }
  </style>

  <!-- Front panel label -->
  <text class="th" x="40" y="28" dominant-baseline="central">Front panel</text>

  <!-- Front chassis -->
  <rect x="40" y="44" width="600" height="130" rx="8" class="panel" stroke-width="1"/>

  <!-- Power button -->
  <circle cx="74" cy="80" r="14" class="box-fill" stroke-width="1.5"/>
  <text class="ts label" x="74" y="110" text-anchor="middle" dominant-baseline="central">Power</text>

  <!-- Status LEDs -->
  <rect x="130" y="68" width="14" height="14" rx="3" class="c-teal" stroke-width="0.5"/>
  <rect x="150" y="68" width="14" height="14" rx="3" class="c-amber" stroke-width="0.5"/>
  <rect x="170" y="68" width="14" height="14" rx="3" class="c-blue" stroke-width="0.5"/>
  <rect x="190" y="68" width="14" height="14" rx="3" class="c-gray" stroke-width="0.5"/>
  <text class="ts label" x="168" y="100" text-anchor="middle" dominant-baseline="central">Status LEDs</text>

  <!-- Audio jack -->
  <circle cx="244" cy="75" r="10" class="box-fill" stroke-width="1"/>
  <circle cx="244" cy="75" r="4" class="c-gray" stroke-width="0"/>
  <text class="ts label" x="244" y="100" text-anchor="middle" dominant-baseline="central">Audio</text>

  <!-- USB 3.2 Gen 1 -->
  <rect x="280" y="60" width="44" height="30" rx="4" class="box-fill" stroke-width="1"/>
  <rect x="285" y="65" width="34" height="20" rx="2" class="c-blue" stroke-width="0.5"/>
  <text class="ts label" x="302" y="100" text-anchor="middle" dominant-baseline="central">USB 3.2</text>
  <text class="ts label" x="302" y="114" text-anchor="middle" dominant-baseline="central">Gen 1</text>

  <!-- USB 3.2 Gen 2 -->
  <rect x="340" y="60" width="44" height="30" rx="4" class="box-fill" stroke-width="1"/>
  <rect x="345" y="65" width="34" height="20" rx="2" class="c-teal" stroke-width="0.5"/>
  <text class="ts label" x="362" y="100" text-anchor="middle" dominant-baseline="central">USB 3.2</text>
  <text class="ts label" x="362" y="114" text-anchor="middle" dominant-baseline="central">Gen 2</text>

  <!-- Vent grille front -->
  <rect x="430" y="54" width="196" height="110" rx="4" class="box-fill" stroke-width="0.5"/>
  <line x1="445" y1="54" x2="445" y2="164" class="grid"/>
  <line x1="460" y1="54" x2="460" y2="164" class="grid"/>
  <line x1="475" y1="54" x2="475" y2="164" class="grid"/>
  <line x1="490" y1="54" x2="490" y2="164" class="grid"/>
  <line x1="505" y1="54" x2="505" y2="164" class="grid"/>
  <line x1="520" y1="54" x2="520" y2="164" class="grid"/>
  <line x1="535" y1="54" x2="535" y2="164" class="grid"/>
  <line x1="550" y1="54" x2="550" y2="164" class="grid"/>
  <line x1="565" y1="54" x2="565" y2="164" class="grid"/>
  <line x1="580" y1="54" x2="580" y2="164" class="grid"/>
  <line x1="595" y1="54" x2="595" y2="164" class="grid"/>
  <line x1="610" y1="54" x2="610" y2="164" class="grid"/>
  <text class="ts label" x="528" y="176" text-anchor="middle" dominant-baseline="central">Vent grille</text>

  <!-- Rear panel label -->
  <text class="th" x="40" y="214" dominant-baseline="central">Rear panel</text>

  <!-- Rear chassis -->
  <rect x="40" y="230" width="600" height="210" rx="8" class="panel" stroke-width="1"/>

  <!-- PCIe slot -->
  <rect x="60" y="248" width="400" height="28" rx="4" class="box-fill" stroke-width="1"/>
  <rect x="64" y="252" width="392" height="20" rx="2" class="c-gray" stroke-width="0.5"/>
  <text class="ts" x="264" y="262" text-anchor="middle" dominant-baseline="central">PCIe expansion slot</text>

  <!-- 10G SFP+ x2 -->
  <rect x="60" y="294" width="46" height="36" rx="4" class="box-fill" stroke-width="1"/>
  <rect x="64" y="298" width="38" height="28" rx="2" class="c-purple" stroke-width="0.5"/>
  <text class="ts" x="83" y="312" text-anchor="middle" dominant-baseline="central">10G</text>
  <text class="ts label" x="83" y="343" text-anchor="middle" dominant-baseline="central">SFP+</text>

  <rect x="114" y="294" width="46" height="36" rx="4" class="box-fill" stroke-width="1"/>
  <rect x="118" y="298" width="38" height="28" rx="2" class="c-purple" stroke-width="0.5"/>
  <text class="ts" x="137" y="312" text-anchor="middle" dominant-baseline="central">10G</text>
  <text class="ts label" x="137" y="343" text-anchor="middle" dominant-baseline="central">SFP+</text>

  <!-- 2.5G RJ45 x2 -->
  <rect x="178" y="294" width="46" height="36" rx="4" class="box-fill" stroke-width="1"/>
  <rect x="182" y="298" width="38" height="28" rx="2" class="c-teal" stroke-width="0.5"/>
  <text class="ts" x="201" y="312" text-anchor="middle" dominant-baseline="central">2.5G</text>
  <text class="ts label" x="201" y="343" text-anchor="middle" dominant-baseline="central">RJ45</text>

  <rect x="232" y="294" width="46" height="36" rx="4" class="box-fill" stroke-width="1"/>
  <rect x="236" y="298" width="38" height="28" rx="2" class="c-teal" stroke-width="0.5"/>
  <text class="ts" x="255" y="312" text-anchor="middle" dominant-baseline="central">2.5G</text>
  <text class="ts label" x="255" y="343" text-anchor="middle" dominant-baseline="central">RJ45</text>

  <!-- USB4 x2 -->
  <rect x="296" y="294" width="32" height="36" rx="6" class="box-fill" stroke-width="1"/>
  <rect x="300" y="298" width="24" height="28" rx="4" class="c-blue" stroke-width="0.5"/>
  <text class="ts label" x="312" y="343" text-anchor="middle" dominant-baseline="central">USB4</text>

  <rect x="336" y="294" width="32" height="36" rx="6" class="box-fill" stroke-width="1"/>
  <rect x="340" y="298" width="24" height="28" rx="4" class="c-blue" stroke-width="0.5"/>
  <text class="ts label" x="352" y="343" text-anchor="middle" dominant-baseline="central">USB4</text>

  <!-- Exhaust fan grille -->
  <rect x="468" y="240" width="158" height="192" rx="4" class="box-fill" stroke-width="0.5"/>
  <line x1="483" y1="240" x2="483" y2="432" class="grid"/>
  <line x1="498" y1="240" x2="498" y2="432" class="grid"/>
  <line x1="513" y1="240" x2="513" y2="432" class="grid"/>
  <line x1="528" y1="240" x2="528" y2="432" class="grid"/>
  <line x1="543" y1="240" x2="543" y2="432" class="grid"/>
  <line x1="558" y1="240" x2="558" y2="432" class="grid"/>
  <line x1="573" y1="240" x2="573" y2="432" class="grid"/>
  <line x1="588" y1="240" x2="588" y2="432" class="grid"/>
  <line x1="603" y1="240" x2="603" y2="432" class="grid"/>
  <text class="ts label" x="547" y="448" text-anchor="middle" dominant-baseline="central">Exhaust fan</text>

  <!-- HDMI -->
  <rect x="60" y="370" width="58" height="32" rx="4" class="box-fill" stroke-width="1"/>
  <rect x="64" y="374" width="50" height="24" rx="2" class="c-coral" stroke-width="0.5"/>
  <text class="ts" x="89" y="386" text-anchor="middle" dominant-baseline="central">HDMI</text>
  <text class="ts label" x="89" y="416" text-anchor="middle" dominant-baseline="central">HDMI</text>

  <!-- USB 3.2 rear -->
  <rect x="136" y="370" width="60" height="32" rx="4" class="box-fill" stroke-width="1"/>
  <rect x="140" y="374" width="52" height="24" rx="2" class="c-blue" stroke-width="0.5"/>
  <text class="ts" x="166" y="386" text-anchor="middle" dominant-baseline="central">USB 3.2</text>
  <text class="ts label" x="166" y="416" text-anchor="middle" dominant-baseline="central">USB 3.2</text>

  <!-- USB 2.0 -->
  <rect x="214" y="370" width="60" height="32" rx="4" class="box-fill" stroke-width="1"/>
  <rect x="218" y="374" width="52" height="24" rx="2" class="c-gray" stroke-width="0.5"/>
  <text class="ts" x="244" y="386" text-anchor="middle" dominant-baseline="central">USB 2.0</text>
  <text class="ts label" x="244" y="416" text-anchor="middle" dominant-baseline="central">USB 2.0</text>

  <!-- DC-in -->
  <circle cx="390" cy="386" r="16" class="box-fill" stroke-width="1"/>
  <circle cx="390" cy="386" r="5" class="c-amber" stroke-width="0"/>
  <text class="ts label" x="390" y="416" text-anchor="middle" dominant-baseline="central">DC-in</text>

  <!-- Dimensions -->
  <text class="ts dim" x="340" y="468" text-anchor="middle" dominant-baseline="central">197 × 168 × 62 mm</text>
  <line x1="40" y1="484" x2="640" y2="484" class="dim-line"/>
  <line x1="40" y1="480" x2="40" y2="488" stroke="#b4b2a9" stroke-width="0.5"/>
  <line x1="640" y1="480" x2="640" y2="488" stroke="#b4b2a9" stroke-width="0.5"/>
  <text class="ts dim" x="340" y="500" text-anchor="middle" dominant-baseline="central">width (197 mm)</text>
</svg>
