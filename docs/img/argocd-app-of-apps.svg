<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" role="img" aria-label="App-of-apps: the k8s-apps repo drives a bootstrap Application that applies every child Application under infrastructure and apps">
  <rect x="0" y="0" width="820" height="470" rx="10" fill="#ffffff" stroke="#d0d7de"/>

  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#57606a"/>
    </marker>
  </defs>

  <!-- repo -->
  <rect x="210" y="26" width="400" height="52" rx="8" fill="#ddf4ff" stroke="#1f6feb"/>
  <text x="410" y="49" text-anchor="middle" font-size="14" font-weight="700" fill="#0a3069" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">github.com/akann/k8s-apps</text>
  <text x="410" y="68" text-anchor="middle" font-size="12" fill="#0a3069">the GitOps repo — source of truth</text>

  <line x1="410" y1="78" x2="410" y2="118" stroke="#57606a" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="424" y="103" font-size="11" fill="#656d76">ArgoCD polls / webhook</text>

  <!-- bootstrap Application -->
  <rect x="90" y="120" width="640" height="128" rx="8" fill="#fbefff" stroke="#8250df"/>
  <text x="410" y="146" text-anchor="middle" font-size="15" font-weight="700" fill="#3e1f79">bootstrap Application  (sync-wave -1,  source: repo root ".")</text>
  <text x="118" y="176" font-size="13" fill="#1f2328">→ renders root <tspan font-family="ui-monospace,SFMono-Regular,Menlo,monospace">kustomization.yaml</tspan></text>
  <text x="118" y="200" font-size="13" fill="#1f2328">→ applies EVERY <tspan font-family="ui-monospace,SFMono-Regular,Menlo,monospace">argocd-app-*.yaml</tspan> (all the child Applications)</text>
  <text x="118" y="224" font-size="13" fill="#1f2328">→ <tspan font-family="ui-monospace,SFMono-Regular,Menlo,monospace">selfHeal: true</tspan>  ⇒  this SET of Applications is itself reconciled</text>

  <!-- branch lines -->
  <line x1="410" y1="248" x2="410" y2="268" stroke="#57606a" stroke-width="2"/>
  <line x1="230" y1="268" x2="590" y2="268" stroke="#57606a" stroke-width="2"/>
  <line x1="230" y1="268" x2="230" y2="300" stroke="#57606a" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="590" y1="268" x2="590" y2="300" stroke="#57606a" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- infrastructure child apps -->
  <rect x="60" y="302" width="340" height="120" rx="8" fill="#dafbe1" stroke="#2da44e"/>
  <text x="230" y="326" text-anchor="middle" font-size="14" font-weight="700" fill="#0a3622"><tspan font-family="ui-monospace,SFMono-Regular,Menlo,monospace">infrastructure/*</tspan> child apps</text>
  <text x="230" y="352" text-anchor="middle" font-size="12" fill="#1f2328">cilium, cert-manager, ingress-nginx,</text>
  <text x="230" y="372" text-anchor="middle" font-size="12" fill="#1f2328">eso, cnpg, harbor, monitoring, …</text>
  <text x="230" y="402" text-anchor="middle" font-size="11" font-style="italic" fill="#656d76">waves 0–8 — foundation first</text>

  <!-- apps child apps -->
  <rect x="420" y="302" width="340" height="120" rx="8" fill="#dafbe1" stroke="#2da44e"/>
  <text x="590" y="326" text-anchor="middle" font-size="14" font-weight="700" fill="#0a3622"><tspan font-family="ui-monospace,SFMono-Regular,Menlo,monospace">apps/*</tspan> child apps</text>
  <text x="590" y="352" text-anchor="middle" font-size="12" fill="#1f2328">akan, yanatech, shared-services, ml,</text>
  <text x="590" y="372" text-anchor="middle" font-size="12" fill="#1f2328">dove-house-tt, immich, kafka, …</text>
  <text x="590" y="402" text-anchor="middle" font-size="11" font-style="italic" fill="#656d76">wave 9 — some in-repo, some external repo</text>

  <text x="410" y="450" text-anchor="middle" font-size="12" fill="#656d76">Each child Application deploys its own real workloads — from a path in this repo, or from the app's own git repo.</text>
</svg>
