# Topic names here MUST match the dotted names in yana-stocks'
# packages/kafka-client/src/topics.ts exactly (KAFKA_TOPICS.*) — that
# package is what every producer/consumer actually connects with, and it is
# the source of truth for the real topic name, not this file.
#
# These previously used hyphenated names (stocks-prices-raw, etc.) that
# didn't match the app code at all. Kafka auto-created the real dotted-name
# topics on first use with 1 partition and no explicit retention config,
# while these KafkaTopic resources quietly managed a completely different,
# never-produced-to, never-consumed-from set of topics for the whole time
# they existed. Confirmed live (2026-07-16) via `kafka-topics.sh --describe`
# and `kafka-consumer-groups.sh --describe` against every consumer group
# (email-service, profile-service, portfolio-api, price-processor,
# portfolio-service): all real traffic is on the dotted names, all on
# partition 0, zero consumers of the old hyphenated names.
#
# All bumped 1 -> 3 on 2026-07-16 (users.registered first, as the pilot;
# the rest followed once that validated cleanly — see git history for the
# two separate commits). Every producer keys its messages (price-ingestor/
# price-processor/sentiment-analyzer/ml-predictor by symbol, auth-service
# by userID, portfolio-service by portfolioId), so bumping partition count
# changes the live key→partition mapping — the safe precondition, confirmed
# fresh immediately before each bump, was every consumer group's lag being
# 0: with nothing backlogged, there's no in-flight message able to race the
# new hash assignment onto a different partition, which is the actual risk
# a partition increase carries on a keyed topic. Strimzi's topic operator
# supports increasing (never decreasing) an existing topic's partition
# count in place — confirmed via kafka-topics.sh --describe that the
# broker-side partition count actually changed, and via
# kafka-consumer-groups.sh --describe that each consumer group rebalanced
# onto the new partitions cleanly (existing partition's lag stayed 0, new
# partitions start at offset 0 with no errors).
#
# stocks.portfolio.events removed 2026-07-24: its portfolio-service
# producer had no consumer anywhere in the codebase (verified 2026-07-23),
# so the producer code was removed from yana-stocks and the KafkaTopic
# deleted here — Strimzi's topic operator drops the live topic on prune.
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: stocks.prices.raw
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 86400000      # 24 hours
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: stocks.prices.processed
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 604800000     # 7 days
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: stocks.signals.sentiment
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 604800000     # 7 days
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: stocks.signals.prediction
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 604800000     # 7 days
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: users.registered
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  # Bumped 1 -> 3 (2026-07-16) as the pilot for the partition-increase
  # follow-up noted above — confirmed consumer group lag=0 immediately
  # before this change, and this topic is keyed by userID with no ongoing
  # per-user derived state (a single registration event per user), making
  # it the lowest-risk candidate to validate the pattern on first.
  partitions: 3
  replicas: 3
  config:
    retention.ms: 604800000     # 7 days
    cleanup.policy: delete
