# Topic names here MUST match the dotted names in shared-services'
# packages/kafka-client/src/topics.ts exactly — see yana-stocks-topics.yaml's
# header comment for the full incident this fixes (hyphenated KafkaTopic
# resources managing orphaned topics nothing ever produced to or consumed
# from, while the real dotted-name topics ran unmanaged).
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: notifications.email.send
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  # partitions: 1 matches the CURRENT live partition count (this topic
  # already exists, auto-created on first use) — see yana-stocks-topics.yaml
  # for why this isn't bumped to match the originally-intended 3 here.
  partitions: 1
  replicas: 3
  config:
    retention.ms: 86400000      # 24 hours
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: notifications.email.failed
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  # partitions: 3 here is safe (unlike notifications.email.send above) —
  # confirmed live 2026-07-16 that this topic does not exist yet (no
  # delivery failure has occurred to trigger email-service's DLQ produce),
  # so there's no existing 1-partition topic to reconcile against and no
  # partition-increase-on-a-live-topic risk.
  partitions: 3
  replicas: 3
  config:
    retention.ms: 2592000000    # 30 days
    cleanup.policy: delete
