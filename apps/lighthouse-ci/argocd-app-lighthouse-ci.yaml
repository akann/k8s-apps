apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lighthouse-ci
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  project: default
  source:
    repoURL: https://github.com/akann/k8s-apps
    path: apps/lighthouse-ci
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: lighthouse-ci
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
