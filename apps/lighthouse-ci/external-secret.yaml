# HTTP Basic Auth credentials protecting the whole lhci-server (UI + API) —
# the same shared credential is used by both yana-stocks CI's upload command
# and a human clicking through from a GitHub commit status. Not Authentik:
# Authentik's SSO flow doesn't cleanly support a non-browser CI caller
# without extra per-path auth-bypass config, and @lhci/server has basic auth
# built in for exactly this dual-caller case.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lighthouse-ci-basic-auth
  namespace: lighthouse-ci
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: lighthouse-ci-basic-auth
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: /lighthouse-ci/BASIC_AUTH_USERNAME
    - secretKey: password
      remoteRef:
        key: /lighthouse-ci/BASIC_AUTH_PASSWORD
