apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentry-gotify-bridge
  namespace: gotify
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentry-gotify-bridge
  template:
    metadata:
      labels:
        app: sentry-gotify-bridge
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: bridge
          image: harbor.yanatech.co.uk/infra/sentry-gotify-bridge:latest
          ports:
            - containerPort: 8080
          env:
            - name: GOTIFY_ENDPOINT
              value: http://gotify.gotify.svc.cluster.local/message
            - name: GOTIFY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gotify-secret
                  key: sentry-token
            - name: SENTRY_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: gotify-secret
                  key: sentry-webhook-secret
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sentry-gotify-bridge
  namespace: gotify
spec:
  selector:
    app: sentry-gotify-bridge
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sentry-gotify-bridge
  namespace: gotify
spec:
  ingressClassName: nginx
  rules:
    - host: gotify.yanatech.co.uk
      http:
        paths:
          - path: /webhook/sentry
            pathType: Prefix
            backend:
              service:
                name: sentry-gotify-bridge
                port:
                  number: 80
  tls:
    - secretName: wildcard-yanatech-tls
      hosts:
        - gotify.yanatech.co.uk
