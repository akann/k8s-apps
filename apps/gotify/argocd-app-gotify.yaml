apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gotify
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/akann/k8s-apps
    path: apps/gotify/manifests
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: gotify
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
