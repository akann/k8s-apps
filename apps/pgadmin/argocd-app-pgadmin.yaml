apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pgadmin
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://helm.runix.net
    chart: pgadmin4
    targetRevision: 1.65.0
    helm:
      releaseName: pgadmin
      values: |
        env:
          email: admin@yanatech.co.uk
          password: pgadmin
        serverDefinitions:
          enabled: true
          servers:
            "1":
              Name: "dove-house-tt"
              Group: "Servers"
              Host: "dove-house-tt-pg-rw.dove-house-tt.svc.cluster.local"
              Port: 5432
              MaintenanceDB: "dove_house_tt"
              Username: "dove_house"
              SSLMode: "prefer"
            "2":
              Name: "dove-house-tt-stg"
              Group: "Servers"
              Host: "dove-house-tt-stg-pg-rw.dove-house-tt-stg.svc.cluster.local"
              Port: 5432
              MaintenanceDB: "dove_house_tt"
              Username: "dove_house"
              SSLMode: "prefer"
            "3":
              Name: "yana-stocks"
              Group: "Servers"
              Host: "auth-service-pg-rw.yana-stocks.svc.cluster.local"
              Port: 5432
              MaintenanceDB: "app"
              Username: "app"
              SSLMode: "prefer"
            "4":
              Name: "app"
              Group: "Servers"
              Host: "pg-main-rw.cnpg-clusters.svc.cluster.local"
              Port: 5432
              MaintenanceDB: "app"
              Username: "app"
              SSLMode: "prefer"
            "5":
              Name: "authentik"
              Group: "Servers"
              Host: "pg-main-rw.cnpg-clusters.svc.cluster.local"
              Port: 5432
              MaintenanceDB: "authentik"
              Username: "authentik"
              SSLMode: "prefer"
            "6":
              Name: "nextcloud"
              Group: "Servers"
              Host: "pg-main-rw.cnpg-clusters.svc.cluster.local"
              Port: 5432
              MaintenanceDB: "nextcloud"
              Username: "nextcloud"
              SSLMode: "prefer"
            "7":
              Name: "vaultwarden"
              Group: "Servers"
              Host: "pg-main-rw.cnpg-clusters.svc.cluster.local"
              Port: 5432
              MaintenanceDB: "vaultwarden"
              Username: "vaultwarden"
              SSLMode: "prefer"
            "8":
              Name: "infisical"
              Group: "Servers"
              Host: "pg-main-rw.cnpg-clusters.svc.cluster.local"
              Port: 5432
              MaintenanceDB: "infisical"
              Username: "infisical"
              SSLMode: "prefer"
            "9":
              Name: "apicurio"
              Group: "Servers"
              Host: "pg-main-rw.cnpg-clusters.svc.cluster.local"
              Port: 5432
              MaintenanceDB: "apicurio"
              Username: "apicurio"
              SSLMode: "prefer"
        extraConfigmapMounts:
          - name: config-local
            mountPath: /pgadmin4/config_local.py
            subPath: config_local.py
            configMap: pgadmin-config-local
            readOnly: true
        ingress:
          enabled: true
          ingressClassName: nginx
          hosts:
            - host: pgadmin.yanatech.co.uk
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: wildcard-yanatech-tls
              hosts:
                - pgadmin.yanatech.co.uk
        persistentVolume:
          enabled: true
          storageClass: ceph-rbd
          size: 1Gi
        podAnnotations:
          backup.velero.io/backup-volumes: pgadmin-data
  destination:
    server: https://kubernetes.default.svc
    namespace: pgadmin
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
