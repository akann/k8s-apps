apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-api-token
  namespace: yana-stocks
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: authentik-api-token
    creationPolicy: Owner
  data:
    - secretKey: AUTHENTIK_API_TOKEN
      remoteRef:
        key: /yana-stocks/authentik/API_TOKEN
