apiVersion: apps/v1
kind: Deployment
metadata:
  name: price-ingestor
  namespace: yana-stocks
  annotations:
    secret.reloader.stakater.com/reload: "price-ingestor-secret"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: price-ingestor
  template:
    metadata:
      labels:
        app: price-ingestor
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: price-ingestor
          image: harbor.yanatech.co.uk/yana-stocks/price-ingestor:3e40a06191dd48da4e1ddec44ed1a8470f8f6307
          env:
            - name: ALPACA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: price-ingestor-secret
                  key: ALPACA_API_KEY
            - name: ALPACA_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: price-ingestor-secret
                  key: ALPACA_API_SECRET
            - name: ALPACA_BASE_URL
              value: "https://data.alpaca.markets"
            - name: KAFKA_BROKERS
              value: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
            - name: SYMBOLS
              value: '["AAPL","GOOGL","MSFT","AMZN","TSLA","NVDA","META","JPM","V","JNJ"]'
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
