apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: portfolio-api-secret
  namespace: yana-stocks
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: portfolio-api-secret
    creationPolicy: Owner
  data:
    - secretKey: REDIS_URL
      remoteRef:
        key: /yana-stocks/portfolio-api/REDIS_URL
