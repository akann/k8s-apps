apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-service
  namespace: yana-stocks
  annotations:
    secret.reloader.stakater.com/reload: "profile-service-secret"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: profile-service
  template:
    metadata:
      labels:
        app: profile-service
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: profile-service
          image: harbor.yanatech.co.uk/yana-stocks/profile-service:fee8dbb469d082fefc8d553536ee77f1826a1c75
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: profile-service-secret
          env:
            - name: PORT
              value: "3000"
            - name: KAFKA_BROKERS
              value: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
            - name: OTEL_SERVICE_NAME
              value: "profile-service"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://tempo.monitoring.svc.cluster.local:4318"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: profile-service
  namespace: yana-stocks
spec:
  selector:
    app: profile-service
  ports:
    - port: 3000
      targetPort: 3000
