apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: profile-service-secret
  namespace: yana-stocks
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: profile-service-secret
    creationPolicy: Owner
  data:
    - secretKey: MONGODB_URI
      remoteRef:
        key: /yana-stocks/profile-service/MONGODB_URI
