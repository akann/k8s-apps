apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: yana-stocks
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: frontend
          image: harbor.yanatech.co.uk/yana-stocks/frontend:c6d5bb0ccb4983a5585095f051121c084c01883a
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_API_URL
              value: "https://api-gateway.yanatech.co.uk/api"
            - name: NEXT_PUBLIC_AUTHENTIK_URL
              value: "https://authentik.yanatech.co.uk"
            - name: NEXT_PUBLIC_AUTHENTIK_CLIENT_ID
              value: "yana-stocks"
            - name: NEXT_PUBLIC_REDIRECT_URI
              value: "https://stocks.yanatech.co.uk/callback"
            - name: OTEL_SERVICE_NAME
              value: "frontend"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://tempo.monitoring.svc.cluster.local:4318"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
