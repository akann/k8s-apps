apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: ml-predictor-success-rate
  namespace: yana-stocks
spec:
  metrics:
    - name: pod-readiness
      initialDelay: 60s
      count: 5
      interval: 30s
      successCondition: result[0] >= 1
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus-operated.monitoring.svc.cluster.local:9090
          query: |
            min(
              kube_pod_container_status_ready{namespace="yana-stocks",pod=~"ml-predictor-.*"}
              or vector(1)
            )
