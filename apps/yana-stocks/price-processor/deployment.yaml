apiVersion: apps/v1
kind: Deployment
metadata:
  name: price-processor
  namespace: yana-stocks
  annotations:
    secret.reloader.stakater.com/reload: "price-processor-secret"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: price-processor
  template:
    metadata:
      labels:
        app: price-processor
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: price-processor
          image: harbor.yanatech.co.uk/yana-stocks/price-processor:2b075e99c155a494ca7f31a6db3c74fce6711ae7
          ports:
            - containerPort: 3000
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: price-processor-secret
                  key: MONGODB_URI
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: price-processor-secret
                  key: REDIS_URL
            - name: KAFKA_BROKERS
              value: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
