apiVersion: apps/v1
kind: Deployment
metadata:
  name: price-processor
  namespace: yana-stocks
  labels:
    app: price-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: price-processor
  template:
    metadata:
      labels:
        app: price-processor
    spec:
      containers:
        - name: price-processor
          image: harbor.yanatech.co.uk/yana-stocks/price-processor:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: price-processor-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
