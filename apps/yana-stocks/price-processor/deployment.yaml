apiVersion: apps/v1
kind: Deployment
metadata:
  name: price-processor
  namespace: yana-stocks
  annotations:
    secret.reloader.stakater.com/reload: "price-processor-secret"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: price-processor
  template:
    metadata:
      labels:
        app: price-processor
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: price-processor
          image: harbor.yanatech.co.uk/yana-stocks/price-processor:5c285c2f06f514d17a8b50cff4c63f584a4c3526
          ports:
            - containerPort: 3000
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: price-processor-secret
                  key: MONGODB_URI
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: price-processor-secret
                  key: REDIS_URL
            - name: MASSIVE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: price-processor-secret
                  key: MASSIVE_API_KEY
            - name: TWELVE_DATA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: price-processor-secret
                  key: TWELVE_DATA_API_KEY
            - name: KAFKA_BROKERS
              value: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
            - name: OTEL_SERVICE_NAME
              value: "price-processor"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://tempo.monitoring.svc.cluster.local:4318"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
