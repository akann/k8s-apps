# POST /api/auth/register → user-service  (no JWT — public)
# Login, refresh, logout are handled directly by Authentik (not proxied through Kong)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-auth-register
  namespace: yana-stocks
  annotations:
    konghq.com/plugins: cors
spec:
  ingressClassName: kong
  rules:
    - host: api-gateway.yanatech.co.uk
      http:
        paths:
          - path: /api/auth/register
            pathType: Exact
            backend:
              service:
                name: user-service
                port:
                  number: 3000
---
# GET /api/auth/me → user-service  (JWT required — lazy-creates profile row)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-auth-me
  namespace: yana-stocks
  annotations:
    konghq.com/plugins: jwt-auth,cors
spec:
  ingressClassName: kong
  rules:
    - host: api-gateway.yanatech.co.uk
      http:
        paths:
          - path: /api/auth/me
            pathType: Exact
            backend:
              service:
                name: user-service
                port:
                  number: 3000
