---
# GET /api/auth/me → auth-service (JWT required)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-auth-me
  namespace: yana-stocks
  annotations:
    konghq.com/plugins: jwt-auth,cors
spec:
  ingressClassName: kong
  rules:
