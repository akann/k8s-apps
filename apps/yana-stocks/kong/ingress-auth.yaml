# /api/auth/* → user-service  (no JWT — public auth endpoints)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-auth
  namespace: yana-stocks
  annotations:
    konghq.com/strip-path: "true"
spec:
  ingressClassName: kong
  rules:
    - host: api-gateway.yanatech.co.uk
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 3000
