---
# POST /api/auth/logout → auth-service (public — invalidates refresh token in body)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-auth-logout
  namespace: yana-stocks
  annotations:
    konghq.com/plugins: cors
