# /health → portfolio-api  (no JWT — gateway liveness check)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-health
  namespace: yana-stocks
spec:
  ingressClassName: kong
  rules:
    - host: api-gateway.yanatech.co.uk
      http:
        paths:
          - path: /health
            pathType: Exact
            backend:
              service:
                name: portfolio-api
                port:
                  number: 3000
---
# /api/auth/* → portfolio-api  (no JWT — public auth endpoints)
# portfolio-api's AuthProxyController handles /api/auth/* and proxies to user-service internally
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-auth
  namespace: yana-stocks
spec:
  ingressClassName: kong
  rules:
    - host: api-gateway.yanatech.co.uk
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: portfolio-api
                port:
                  number: 3000
