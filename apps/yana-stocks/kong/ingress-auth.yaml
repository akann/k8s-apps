# Auth routes — all public except /api/auth/me which requires JWT
---
# POST /api/auth/register → auth-service (public)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-auth-register
  namespace: yana-stocks
  annotations:
    konghq.com/plugins: cors
spec:
  ingressClassName: kong
  rules:
    - host: api-gateway.yanatech.co.uk
      http:
        paths:
          - path: /api/auth/register
            pathType: Exact
            backend:
              service:
                name: auth-service
                port:
                  number: 3000
---
