# Creates the Kong JWT credential Secret from Infisical.
# kongCredType=jwt  algorithm=HS256  key=yana-stocks (must match 'iss' claim in JWTs)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: yana-stocks-jwt-credential
  namespace: yana-stocks
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: yana-stocks-jwt-credential
    creationPolicy: Owner
    template:
      metadata:
        labels:
          konghq.com/credential: jwt
      data:
        kongCredType: jwt
        algorithm: HS256
        key: yana-stocks
        secret: "{{ .jwt_secret }}"
  data:
    - secretKey: jwt_secret
      remoteRef:
        key: /yana-stocks/user-service/JWT_SECRET
