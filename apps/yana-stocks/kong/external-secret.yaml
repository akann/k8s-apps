# Pulls JWT_SECRET from Infisical and creates a Kong HS256 JWT credential.
# Kong matches the 'iss: "yana-stocks"' claim in access tokens issued by user-service
# to this credential and verifies the signature with the shared secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: user-service-jwt-credential
  namespace: yana-stocks
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: user-service-jwt-credential
    creationPolicy: Owner
    template:
      metadata:
        labels:
          konghq.com/credential: jwt
      data:
        kongCredType: jwt
        algorithm: HS256
        key: "yana-stocks"
        secret: "{{ .jwt_secret }}"
  data:
    - secretKey: jwt_secret
      remoteRef:
        key: /yana-stocks/user-service/JWT_SECRET
