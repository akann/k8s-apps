# Pulls Authentik's RSA public key (PEM) from Infisical and creates a Kong JWT credential.
# One-time setup: fetch from https://authentik.yanatech.co.uk/application/o/yana-stocks/jwks/
# convert JWK → PEM and store at /yana-stocks/kong/AUTHENTIK_RSA_PUBLIC_KEY in Infisical.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-jwt-credential
  namespace: yana-stocks
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: authentik-jwt-credential
    creationPolicy: Owner
    template:
      metadata:
        labels:
          konghq.com/credential: jwt
      data:
        kongCredType: jwt
        algorithm: RS256
        # key must exactly match the iss claim in Authentik JWTs
        key: "https://authentik.yanatech.co.uk/application/o/yana-stocks/"
        rsa_public_key: "{{ .rsa_public_key }}"
  data:
    - secretKey: rsa_public_key
      remoteRef:
        key: /yana-stocks/kong/AUTHENTIK_RSA_PUBLIC_KEY
