# JWT-protected API routes
# strip-path is NOT set — all backends serve routes under the full /api/* prefix
---
# /api/stocks/* → portfolio-api (StocksController: /api/stocks/:symbol, /api/stocks/:symbol/history)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-stocks
  namespace: yana-stocks
  annotations:
    konghq.com/plugins: jwt-auth,cors
spec:
  ingressClassName: kong
  rules:
    - host: api-gateway.yanatech.co.uk
      http:
        paths:
          - path: /api/stocks
            pathType: Prefix
            backend:
              service:
                name: portfolio-api
                port:
                  number: 3000
---
