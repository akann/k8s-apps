apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: yana-stocks
  annotations:
    secret.reloader.stakater.com/reload: "auth-service-secret,auth-service-pg-app"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: auth-service
          image: harbor.yanatech.co.uk/yana-stocks/auth-service:fee8dbb469d082fefc8d553536ee77f1826a1c75
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: auth-service-secret
          env:
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: auth-service-pg-app
                  key: uri
            - name: KAFKA_BROKERS
              value: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
            - name: JWT_EXPIRES_IN
              value: "15m"
            - name: JWT_REFRESH_EXPIRES_IN
              value: "168h"
            - name: OTEL_SERVICE_NAME
              value: "auth-service"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://tempo.monitoring.svc.cluster.local:4318"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: yana-stocks
spec:
  selector:
    app: auth-service
  ports:
    - port: 3000
      targetPort: 3000
