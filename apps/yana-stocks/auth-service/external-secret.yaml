apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: auth-service-secret
  namespace: yana-stocks
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: auth-service-secret
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: /yana-stocks/auth-service/JWT_SECRET
    - secretKey: REDIS_URL
      remoteRef:
        key: /yana-stocks/auth-service/REDIS_URL
    - secretKey: FRONTEND_URL
      remoteRef:
        key: /yana-stocks/auth-service/FRONTEND_URL
    - secretKey: EMAIL_API_KEY
      remoteRef:
        key: /shared-services/email-api/EMAIL_API_KEY
    - secretKey: SENTRY_DSN
      remoteRef:
        key: /yana-stocks/auth-service/SENTRY_DSN
