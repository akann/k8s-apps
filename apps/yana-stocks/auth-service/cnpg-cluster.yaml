apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: auth-service-pg
  namespace: yana-stocks
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"
  bootstrap:
    initdb:
      postInitSQL:
        - CREATE SCHEMA IF NOT EXISTS auth
        - ALTER ROLE app SET search_path = auth
  storage:
    size: 10Gi
    storageClass: ceph-rbd
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
