apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: auth-service-pg
  namespace: yana-stocks
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"
  bootstrap:
    initdb:
      postInitSQL:
        - CREATE SCHEMA IF NOT EXISTS auth
        - ALTER ROLE app SET search_path = auth
  backup:
    barmanObjectStore:
      destinationPath: s3://yanatech-cnpg-backups/auth-service-pg
      endpointURL: https://s3.eu-central-003.backblazeb2.com
      s3Credentials:
        accessKeyId:
          name: cnpg-b2-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-b2-credentials
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: 7d
  storage:
    size: 10Gi
    storageClass: ceph-rbd
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
