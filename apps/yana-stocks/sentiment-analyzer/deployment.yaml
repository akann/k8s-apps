apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-analyzer
  namespace: yana-stocks
  annotations:
    secret.reloader.stakater.com/reload: "sentiment-analyzer-secret"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentiment-analyzer
  template:
    metadata:
      labels:
        app: sentiment-analyzer
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: sentiment-analyzer
          image: harbor.yanatech.co.uk/yana-stocks/sentiment-analyzer:c6d5bb0ccb4983a5585095f051121c084c01883a
          env:
            - name: ALPACA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sentiment-analyzer-secret
                  key: ALPACA_API_KEY
            - name: ALPACA_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: sentiment-analyzer-secret
                  key: ALPACA_API_SECRET
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: sentiment-analyzer-secret
                  key: MONGODB_URI
            - name: KAFKA_BROKERS
              value: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
            - name: HUGGINGFACE_MODEL
              value: "ProsusAI/finbert"
            - name: PYTHONPATH
              value: "/app/src"
            - name: HF_HOME
              value: "/tmp/huggingface"
            - name: POLL_INTERVAL_SECONDS
              value: "3600"
            - name: OTEL_SERVICE_NAME
              value: "sentiment-analyzer"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://tempo.monitoring.svc.cluster.local:4318"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
