apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-service
  namespace: yana-stocks
  labels:
    app: portfolio-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-service
  template:
    metadata:
      labels:
        app: portfolio-service
    spec:
      containers:
        - name: portfolio-service
          image: harbor.yanatech.co.uk/yana-stocks/portfolio-service:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: portfolio-service-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
