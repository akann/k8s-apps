apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-service
  namespace: yana-stocks
  annotations:
    secret.reloader.stakater.com/reload: "portfolio-service-secret"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio-service
  template:
    metadata:
      labels:
        app: portfolio-service
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: portfolio-service
          image: harbor.yanatech.co.uk/yana-stocks/portfolio-service:c1fac0d357717b185745fd11fe117c58c7350fb5
          ports:
            - containerPort: 3000
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: portfolio-service-secret
                  key: MONGODB_URI
            - name: KAFKA_BROKERS
              value: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
