apiVersion: apps/v1
kind: Deployment
metadata:
  name: turbo-cache
  namespace: yana-stocks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: turbo-cache
  template:
    metadata:
      labels:
        app: turbo-cache
    spec:
      automountServiceAccountToken: false
      containers:
        - name: turbo-cache
          image: ducktors/turborepo-remote-cache:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: STORAGE_PROVIDER
              value: "s3"
            - name: S3_ENDPOINT
              value: "http://minio.minio.svc.cluster.local:9000"
            - name: S3_BUCKET
              value: "turborepocache"
            - name: AWS_REGION
              value: "us-east-1"
            - name: S3_FORCE_PATH_STYLE
              value: "true"
            - name: TURBO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: turbo-cache-secret
                  key: TURBO_TOKEN
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: turbo-cache-secret
                  key: MINIO_ACCESS_KEY
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: turbo-cache-secret
                  key: MINIO_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /v8/artifacts/status
              port: 3000
              httpHeaders:
                - name: Authorization
                  value: Bearer readiness-probe-bypass
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: turbo-cache
  namespace: yana-stocks
spec:
  selector:
    app: turbo-cache
  ports:
    - port: 3000
      targetPort: 3000
