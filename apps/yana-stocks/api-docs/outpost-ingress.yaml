apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-docs-outpost
  namespace: yana-stocks
spec:
  ingressClassName: nginx
  rules:
    - host: api-docs.yanatech.co.uk
      http:
        paths:
          - path: /outpost.goauthentik.io
            pathType: Prefix
            backend:
              service:
                name: ak-outpost-api-docs
                port:
                  number: 9000
  tls:
    - secretName: wildcard-yanatech-tls
      hosts:
        - api-docs.yanatech.co.uk
---
apiVersion: v1
kind: Service
metadata:
  name: ak-outpost-api-docs
  namespace: yana-stocks
spec:
  type: ExternalName
  externalName: ak-outpost-api-docs.authentik.svc.cluster.local
  ports:
    - port: 9000
