apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-docs
  namespace: yana-stocks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-docs
  template:
    metadata:
      labels:
        app: api-docs
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: api-docs
          image: harbor.yanatech.co.uk/yana-stocks/api-docs:bd6b65f6e3f8c0a1b01cb7fe1a4269822559eea9
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-docs
  namespace: yana-stocks
spec:
  selector:
    app: api-docs
  ports:
    - port: 80
      targetPort: 80
