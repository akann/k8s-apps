apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-docs
  namespace: yana-stocks
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api-docs.yanatech.co.uk
      secretName: wildcard-yanatech-tls
  rules:
    - host: api-docs.yanatech.co.uk
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-docs
                port:
                  number: 80
