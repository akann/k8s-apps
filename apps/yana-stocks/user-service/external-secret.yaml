apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: user-service-secret
  namespace: yana-stocks
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: user-service-secret
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: /yana-stocks/user-service/JWT_SECRET
    - secretKey: JWT_REFRESH_SECRET
      remoteRef:
        key: /yana-stocks/user-service/JWT_REFRESH_SECRET
    - secretKey: REDIS_URL
      remoteRef:
        key: /yana-stocks/user-service/REDIS_URL
    - secretKey: FRONTEND_URL
      remoteRef:
        key: /yana-stocks/user-service/FRONTEND_URL
    - secretKey: SMTP_HOST
      remoteRef:
        key: /yana-stocks/user-service/SMTP_HOST
    - secretKey: SMTP_PORT
      remoteRef:
        key: /yana-stocks/user-service/SMTP_PORT
    - secretKey: SMTP_USERNAME
      remoteRef:
        key: /yana-stocks/user-service/SMTP_USERNAME
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: /yana-stocks/user-service/SMTP_PASSWORD
    - secretKey: SMTP_FROM
      remoteRef:
        key: /yana-stocks/user-service/SMTP_FROM
