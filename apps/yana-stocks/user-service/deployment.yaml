apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: yana-stocks
  annotations:
    secret.reloader.stakater.com/reload: "user-service-secret,user-service-pg-app"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      initContainers:
        - name: migrate
          image: harbor.yanatech.co.uk/yana-stocks/user-service:92ae50bfec496a41d2c270036eb9fc31f3a8a978
          command: ["/bin/sh", "-c", "node_modules/.bin/prisma migrate deploy --schema=prisma/schema.prisma"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: user-service-pg-app
                  key: uri
      containers:
        - name: user-service
          image: harbor.yanatech.co.uk/yana-stocks/user-service:92ae50bfec496a41d2c270036eb9fc31f3a8a978
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: user-service-secret
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: user-service-pg-app
                  key: uri
            - name: KAFKA_BROKERS
              value: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
            - name: OTEL_SERVICE_NAME
              value: "user-service"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://tempo.monitoring.svc.cluster.local:4318"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
