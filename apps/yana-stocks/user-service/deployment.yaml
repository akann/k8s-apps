apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: yana-stocks
  annotations:
    secret.reloader.stakater.com/reload: "user-service-secret,user-service-pg-app"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      initContainers:
        - name: migrate
          image: harbor.yanatech.co.uk/yana-stocks/user-service:6d8accf35f71600af60db667ed8a07bd74e44d96
          command: ["node", "node_modules/.bin/prisma", "migrate", "deploy", "--schema=prisma/schema.prisma"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: user-service-pg-app
                  key: uri
      containers:
        - name: user-service
          image: harbor.yanatech.co.uk/yana-stocks/user-service:6d8accf35f71600af60db667ed8a07bd74e44d96
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: user-service-pg-app
                  key: uri
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: user-service-secret
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: user-service-secret
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              value: "15m"
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: user-service-secret
                  key: JWT_REFRESH_SECRET
            - name: JWT_REFRESH_EXPIRES_IN
              value: "7d"
            - name: KAFKA_BROKERS
              value: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
