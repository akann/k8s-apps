apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yana-stocks
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  project: default
  source:
    repoURL: https://github.com/akann/k8s-apps
    targetRevision: HEAD
    path: apps/yana-stocks
  destination:
    server: https://kubernetes.default.svc
    namespace: yana-stocks
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: price-ingestor
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: Deployment
      name: sentiment-analyzer
      jsonPointers:
        - /spec/replicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
