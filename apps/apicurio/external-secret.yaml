apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: apicurio-secret
  namespace: apicurio
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: apicurio-secret
    creationPolicy: Owner
  data:
    - secretKey: db-password
      remoteRef:
        key: /apicurio/db-password
