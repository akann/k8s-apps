apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apicurio
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  project: default
  source:
    repoURL: https://charts.apicur.io
    chart: apicurio-registry
    targetRevision: "*"
    helm:
      valuesObject:
        image:
          tag: latest-release

        registryApplication:
          persistence:
            sql:
              enabled: true
              dialect: postgresql
              datasourceUrl: jdbc:postgresql://pg-main-rw.cnpg-clusters.svc.cluster.local:5432/apicurio
              datasourceUsername: apicurio
              datasourcePassword:
                secretName: apicurio-secret
                secretKey: db-password

        ingress:
          enabled: true
          className: nginx
          host: apicurio.yanatech.co.uk
          tls:
            enabled: true
            secretName: wildcard-yanatech-tls

        podMonitor:
          enabled: true
          labels:
            release: kube-prometheus-stack
  destination:
    server: https://kubernetes.default.svc
    namespace: apicurio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
