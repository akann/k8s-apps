---
# immich-secrets: DB_PASSWORD + SECRET_KEY from Infisical /immich/
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-secrets
  namespace: immich
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: immich-secrets
    creationPolicy: Owner
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: /immich/SECRET_KEY
    - secretKey: DB_PASSWORD
      remoteRef:
        key: /immich/DB_PASSWORD
---
# immich-db-credentials: used by CNPG cluster for immich user password
# Must be type kubernetes.io/basic-auth with username + password keys
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-db-credentials
  namespace: immich
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: immich-db-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: immich
        password: "{{ .DB_PASSWORD }}"
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: /immich/DB_PASSWORD
