apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "11"
spec:
  project: default
  source:
    repoURL: ghcr.io/immich-app/immich-charts
    chart: immich
    targetRevision: 0.10.3
    helm:
      valuesObject:
        controllers:
          main:
            containers:
              main:
                image:
                  tag: v1.134.0
                env:
                  DB_HOSTNAME: "immich-postgres-rw.immich.svc.cluster.local"
                  DB_USERNAME: "immich"
                  DB_DATABASE_NAME: "immich"
                  DB_PASSWORD:
                    valueFrom:
                      secretKeyRef:
                        name: immich-secrets
                        key: DB_PASSWORD
                  SECRET_KEY:
                    valueFrom:
                      secretKeyRef:
                        name: immich-secrets
                        key: SECRET_KEY
                  REDIS_HOSTNAME: '{{ printf "%s-valkey" .Release.Name }}'
                  IMMICH_MACHINE_LEARNING_URL: '{{ printf "http://%s-machine-learning:3003" .Release.Name }}'
        immich:
          metrics:
            enabled: true
          persistence:
            library:
              existingClaim: immich-library
        server:
          enabled: true
          ingress:
            main:
              enabled: true
              annotations:
                nginx.ingress.kubernetes.io/proxy-body-size: "0"
                nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
                nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
              ingressClassName: nginx
              hosts:
                - host: photos.yanatech.co.uk
                  paths:
                    - path: /
                      pathType: Prefix
              tls:
                - secretName: wildcard-yanatech-tls
                  hosts:
                    - photos.yanatech.co.uk
        machine-learning:
          enabled: true
          resources:
            requests:
              cpu: "250m"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
        valkey:
          enabled: true
          controllers:
            main:
              containers:
                main:
                  image:
                    repository: docker.io/valkey/valkey
                    tag: 9.0-alpine
  destination:
    server: https://kubernetes.default.svc
    namespace: immich
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
