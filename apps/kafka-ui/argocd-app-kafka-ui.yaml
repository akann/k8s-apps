apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-ui
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://provectus.github.io/kafka-ui-charts
    chart: kafka-ui
    targetRevision: "*"
    helm:
      values: |
        yamlApplicationConfig:
          kafka:
            clusters:
              - name: kafka-cluster
                bootstrapServers: kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092
          auth:
            type: disabled
        podSecurityContext:
          runAsNonRoot: true
          runAsUser: 100
          seccompProfile:
            type: RuntimeDefault
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        volumes:
          - name: tmp
            emptyDir: {}
        volumeMounts:
          - name: tmp
            mountPath: /tmp
        ingress:
          enabled: true
          ingressClassName: nginx
          host: kafka-ui.yanatech.co.uk
          annotations:
            nginx.ingress.kubernetes.io/auth-url: "http://ak-outpost-kafka-ui.authentik.svc.cluster.local:9000/outpost.goauthentik.io/auth/nginx"
            nginx.ingress.kubernetes.io/auth-signin: "https://kafka-ui.yanatech.co.uk/outpost.goauthentik.io/start?rd=$escaped_request_uri"
            nginx.ingress.kubernetes.io/auth-response-headers: "Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid"
            nginx.ingress.kubernetes.io/auth-snippet: |
              proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
          tls:
            enabled: true
            secretName: wildcard-yanatech-tls
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
