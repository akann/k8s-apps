name: Ingest Docs

# Feeds changed docs into the k8s-docs RAG chatbot (ml.yanatech.co.uk/k8s-docs).
# k8s-apps is the only source repo in scope — it's the only one of this
# workspace's repos that's public, and the chatbot's chat page
# (akan.nkweini.org/k8s-docs) is public with no page-level auth. Adding
# another (private) repo here without first gating that page behind
# Authentik would let anyone read private-repo content via the chatbot as a
# side channel — see ml repo's plan doc for the full rationale.

on:
  push:
    branches:
      - main
    paths:
      - '**/*.md'

jobs:
  ingest-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect and POST changed docs
        env:
          INGEST_WEBHOOK_SECRET: ${{ secrets.INGEST_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail

          CHANGED=$(git diff --name-only --diff-filter=ACM HEAD^ HEAD -- '*.md' '**/*.md' || true)
          DELETED=$(git diff --name-only --diff-filter=D HEAD^ HEAD -- '*.md' '**/*.md' || true)

          if [ -z "$CHANGED" ] && [ -z "$DELETED" ]; then
            echo "No doc changes, skipping ingest."
            exit 0
          fi

          # File contents (and the assembled payload) are large enough to
          # blow past the ~128KB per-argument exec limit if passed through
          # shell variables into `jq --arg`/`--argjson` or `curl -d`. Every
          # step below reads/writes files instead, so no file content ever
          # travels through argv.
          WORKDIR=$(mktemp -d)
          FILES_JSONL="$WORKDIR/files.jsonl"
          : > "$FILES_JSONL"
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            jq -n --arg path "$f" --rawfile content "$f" '{path: $path, content: $content}' >> "$FILES_JSONL"
          done <<< "$CHANGED"
          jq -s '.' "$FILES_JSONL" > "$WORKDIR/files.json"

          printf '%s\n' $DELETED | jq -R 'select(length > 0)' | jq -s '.' > "$WORKDIR/deleted.json"

          jq -n \
            --arg repo "k8s-apps" \
            --arg sha "${{ github.sha }}" \
            --slurpfile files "$WORKDIR/files.json" \
            --slurpfile deleted "$WORKDIR/deleted.json" \
            '{sourceRepo: $repo, commitSha: $sha, files: $files[0], deletedPaths: $deleted[0]}' > "$WORKDIR/payload.json"

          curl -sf -X POST https://ml.yanatech.co.uk/k8s-docs/ingest/webhook \
            -H "Authorization: Bearer $INGEST_WEBHOOK_SECRET" \
            -H "Content-Type: application/json" \
            --data-binary @"$WORKDIR/payload.json"
