name: Build CNPG Custom Image

on:
  push:
    paths:
      - 'infrastructure/cnpg/docker/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: runners-k8s-apps
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.yanatech.co.uk
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: infrastructure/cnpg/docker
          push: true
          tags: |
            harbor.yanatech.co.uk/infra/cnpg-postgresql:18
            harbor.yanatech.co.uk/infra/cnpg-postgresql:18-vchord1.1.1
