name: ArgoCD refresh

# No ArgoCD webhook is configured — argocd.yanatech.co.uk has no public DNS
# record, so GitHub can never reach it. This runs on the self-hosted runner
# (already inside the cluster network) so it can patch the bootstrap
# Application's refresh annotation directly via kube-apiserver, using its own
# auto-mounted ServiceAccount token — scoped by
# infrastructure/argocd/ci-refresh-rbac.yaml to get/patch on exactly the
# "bootstrap" Application, nothing else. Otherwise ArgoCD only picks up a push
# on its default ~3min poll.

on:
  push:
    branches: [main]

jobs:
  argocd-refresh:
    runs-on: runners-k8s-apps
    steps:
      - name: Trigger ArgoCD refresh
        run: |
          curl -sf --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
            -H "Authorization: Bearer $(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
            -H "Content-Type: application/merge-patch+json" \
            -X PATCH \
            "https://kubernetes.default.svc/apis/argoproj.io/v1alpha1/namespaces/argocd/applications/bootstrap" \
            -d "{\"metadata\":{\"annotations\":{\"argocd.argoproj.io/refresh\":\"$(date +%s)\"}}}"
