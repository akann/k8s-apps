name: Build Sentry-Gotify Bridge Image

on:
  push:
    paths:
      - 'apps/gotify/sentry-bridge/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: runners-k8s-apps
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.yanatech.co.uk
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/gotify/sentry-bridge
          push: true
          tags: |
            harbor.yanatech.co.uk/infra/sentry-gotify-bridge:latest
            harbor.yanatech.co.uk/infra/sentry-gotify-bridge:${{ github.sha }}
