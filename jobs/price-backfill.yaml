apiVersion: batch/v1
kind: Job
metadata:
  name: price-backfill
  namespace: yana-stocks
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: backfill
          image: harbor.yanatech.co.uk/yana-stocks/price-ingestor:latest
          command: ["backfill-history"]
          env:
            - name: ALPACA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: price-ingestor-secret
                  key: ALPACA_API_KEY
            - name: ALPACA_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: price-ingestor-secret
                  key: ALPACA_API_SECRET
            - name: ALPACA_BASE_URL
              value: "https://data.alpaca.markets"
            - name: ALPACA_FEED
              value: "iex"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: price-processor-secret
                  key: MONGODB_URI
            - name: SYMBOLS
              value: "AAPL,GOOGL,MSFT,AMZN,TSLA,NVDA,META,JPM,V,JNJ"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
