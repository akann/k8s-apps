# CiliumNetworkPolicy required for akan's server to reach k8s-docs's Service
# (the k8s-docs RAG chatbot query endpoint, not exposed on the public Ingress).
# Standard NetworkPolicy cross-namespace ClusterIP routing fails in Cilium
# native routing mode — same pattern as ciliumnetpol-grafana-pg.yaml.
#
# DNS and general HTTPS (443) egress for akan now come from the standard
# default-deny-all + allow-akan NetworkPolicy pair in infrastructure/
# network-policies/netpol-infrastructure.yaml (Cilium unions allow rules
# across every applicable NetworkPolicy/CiliumNetworkPolicy selecting a pod),
# so this policy no longer needs a toEntities:all catch-all — it only adds
# the one thing those can't express: cross-namespace ClusterIP routing to
# k8s-docs. Do not add this policy back to a namespace with no other
# NetworkPolicy without restoring a catch-all — see the network-policies
# CLAUDE.md's "first policy flips default" rule.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-akan-to-k8s-docs
  namespace: akan
spec:
  endpointSelector:
    matchLabels:
      app: akan
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: k8s-docs
            app: k8s-docs
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
