# CiliumNetworkPolicy required for akan's server to reach k8s-docs's Service
# (the k8s-docs RAG chatbot query endpoint, not exposed on the public Ingress).
# Standard NetworkPolicy cross-namespace ClusterIP routing fails in Cilium
# native routing mode — same pattern as ciliumnetpol-grafana-pg.yaml.
#
# IMPORTANT: this is the only policy of any kind that selects `app: akan`
# pods. The moment a CiliumNetworkPolicy/NetworkPolicy selects a pod for a
# given policyType, that pod flips to default-deny for that direction except
# what's explicitly allowed — so without the `toEntities: all` egress rule
# below, this policy would silently break every other akan egress path (DNS,
# the contact form's call to api-gateway.yanatech.co.uk, etc.), not just add
# the k8s-docs rule. The toEntities:all rule restores akan's original
# fully-open egress posture; the toEndpoints rule stays for documentation and
# because it's the only form that reliably resolves cross-namespace ClusterIP
# traffic in this cluster's Cilium native routing mode.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-akan-to-k8s-docs
  namespace: akan
spec:
  endpointSelector:
    matchLabels:
      app: akan
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: k8s-docs
            app: k8s-docs
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    - toEntities:
        - all
