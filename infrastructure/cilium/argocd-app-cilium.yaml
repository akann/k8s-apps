apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://helm.cilium.io
    chart: cilium
    targetRevision: 1.17.3
    helm:
      valuesObject:
        routingMode: native
        autoDirectNodeRoutes: true
        ipv4NativeRoutingCIDR: 10.244.0.0/16
        devices: eth0
        kubeProxyReplacement: true
        k8sServiceHost: 192.168.33.21
        k8sServicePort: 6443
        ipam:
          mode: cluster-pool
          operator:
            clusterPoolIPv4PodCIDRList:
              - 10.244.0.0/16
        hubble:
          enabled: true
          relay:
            enabled: true
          ui:
            enabled: true
            ingress:
              enabled: true
              className: nginx
              annotations:
                nginx.ingress.kubernetes.io/auth-url: "https://hubble.yanatech.co.uk/outpost.goauthentik.io/auth/nginx"
                nginx.ingress.kubernetes.io/auth-signin: "https://hubble.yanatech.co.uk/outpost.goauthentik.io/start?rd=$escaped_request_uri"
                nginx.ingress.kubernetes.io/auth-response-headers: "Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid"
                nginx.ingress.kubernetes.io/auth-snippet: |
                  proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
                nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
                nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
                nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
                nginx.ingress.kubernetes.io/configuration-snippet: |
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
              hosts:
                - hubble.yanatech.co.uk
              tls:
                - secretName: wildcard-yanatech-tls
                  hosts:
                    - hubble.yanatech.co.uk
        operator:
          replicas: 2
        bpf:
          masquerade: true
        prometheus:
          enabled: true
          serviceMonitor:
            enabled: true
            labels:
              release: kube-prometheus-stack
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
