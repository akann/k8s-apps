apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infisical
spec:
  provider:
    infisical:
      auth:
        universalAuthCredentials:
          clientId:
            name: infisical-eso-credentials
            namespace: external-secrets
            key: clientId
          clientSecret:
            name: infisical-eso-credentials
            namespace: external-secrets
            key: clientSecret
      hostAPI: https://infisical.yanatech.co.uk/api
      secretsScope:
        projectSlug: k8s-homelab
        environmentSlug: prod
        recursive: true
