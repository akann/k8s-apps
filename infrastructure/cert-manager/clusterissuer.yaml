apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: akan2000@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
        selector:
          dnsZones:
            - yanatech.co.uk
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token-nkweini
              key: api-token
        selector:
          dnsZones:
            - nkweini.org
