# Dedicated public-only hostname for GitHub webhook delivery — deliberately
# NOT argocd.yanatech.co.uk (which has no public DNS record and stays that
# way; see k8s-apps/CLAUDE.md's "ArgoCD webhook" section). Routes exactly
# /api/webhook to argocd-server; every other path 404s via ingress-nginx's
# default backend since no other rule matches this host. Reuses the existing
# wildcard-yanatech-tls cert (already covers *.yanatech.co.uk, already
# reflected into the argocd namespace for the main argocd-server Ingress).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-webhook
  namespace: argocd
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
spec:
  ingressClassName: nginx
  rules:
    - host: argocd-webhook.yanatech.co.uk
      http:
        paths:
          - path: /api/webhook
            pathType: Exact
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
  tls:
    - hosts:
        - argocd-webhook.yanatech.co.uk
      secretName: wildcard-yanatech-tls
