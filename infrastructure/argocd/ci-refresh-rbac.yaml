# Lets each repo's self-hosted CI runner trigger an immediate ArgoCD refresh
# after pushing, instead of waiting for the default ~3min git poll. No ArgoCD
# webhook is used (argocd.yanatech.co.uk has no public DNS record, so GitHub
# can never reach it — see k8s-apps CLAUDE.md's "ArgoCD webhook" note).
# Scope is deliberately narrow: each runner's own ServiceAccount
# (runners-<repo>-gha-rs-no-permission, actions-runner namespace — the actual
# identity ephemeral job pods run as, per ARC's naming convention) can only
# `get`/`patch` its own single named Application, nothing else.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ci-refresh-bootstrap
  namespace: argocd
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    resourceNames: ["bootstrap"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-refresh-bootstrap
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: runners-k8s-apps-gha-rs-no-permission
    namespace: actions-runner
roleRef:
  kind: Role
  name: ci-refresh-bootstrap
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ci-refresh-yana-stocks
  namespace: argocd
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    resourceNames: ["yana-stocks"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-refresh-yana-stocks
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: runners-yana-stocks-gha-rs-no-permission
    namespace: actions-runner
roleRef:
  kind: Role
  name: ci-refresh-yana-stocks
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
