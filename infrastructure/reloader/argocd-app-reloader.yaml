apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reloader
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://stakater.github.io/stakater-charts
    chart: reloader
    targetRevision: 2.2.12
    helm:
      releaseName: reloader
      valuesObject:
        reloader:
          watchGlobally: true
          reloadOnCreate: true
  destination:
    server: https://kubernetes.default.svc
    namespace: reloader
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
