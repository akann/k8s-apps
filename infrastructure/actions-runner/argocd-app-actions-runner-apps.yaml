apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: actions-runner-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/akann/k8s-apps
    targetRevision: HEAD
    path: infrastructure/actions-runner
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
