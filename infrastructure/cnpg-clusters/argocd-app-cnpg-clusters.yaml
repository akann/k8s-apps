apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-clusters
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "9"
spec:
  project: default
  source:
    repoURL: https://github.com/akann/k8s-apps
    targetRevision: HEAD
    path: infrastructure/cnpg-clusters
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-clusters
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
