apiVersion: v1
kind: Service
metadata:
  name: ak-outpost-mongo-express
  namespace: mongo-express
spec:
  type: ExternalName
  externalName: ak-outpost-mongo-express.authentik.svc.cluster.local
  ports:
    - port: 9000
      targetPort: 9000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ak-outpost-mongo-express
  namespace: mongo-express
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "512k"
spec:
  ingressClassName: nginx
  rules:
    - host: mongo.yanatech.co.uk
      http:
        paths:
          - path: /outpost.goauthentik.io
            pathType: Prefix
            backend:
              service:
                name: ak-outpost-mongo-express
                port:
                  number: 9000
  tls:
    - hosts:
        - mongo.yanatech.co.uk
      secretName: wildcard-yanatech-tls
