apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: redis
    targetRevision: 27.0.4
    helm:
      releaseName: redis
      valuesObject:
        architecture: standalone
        auth:
          enabled: true
          existingSecret: redis-secret
          existingSecretPasswordKey: redis-password
        master:
          persistence:
            enabled: true
            storageClass: ceph-rbd
            size: 5Gi
          podAnnotations:
            backup.velero.io/backup-volumes: redis-data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
            namespace: monitoring
            labels:
              release: kube-prometheus-stack
  destination:
    server: https://kubernetes.default.svc
    namespace: redis
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
