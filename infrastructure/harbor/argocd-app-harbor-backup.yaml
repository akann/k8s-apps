apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor-backup
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "9"
spec:
  project: default
  source:
    repoURL: https://github.com/akann/k8s-apps
    path: infrastructure/harbor
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
