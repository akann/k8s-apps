---
apiVersion: v1
kind: Service
metadata:
  name: ak-outpost-argo-rollouts
  namespace: argo-rollouts
spec:
  type: ExternalName
  externalName: ak-outpost-argo-rollouts.authentik.svc.cluster.local
  ports:
    - port: 9000
      targetPort: 9000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argo-rollouts-dashboard-outpost
  namespace: argo-rollouts
spec:
  ingressClassName: nginx
  rules:
    - host: rollouts.yanatech.co.uk
      http:
        paths:
          - path: /outpost.goauthentik.io
            pathType: Prefix
            backend:
              service:
                name: ak-outpost-argo-rollouts
                port:
                  number: 9000
  tls:
    - hosts:
        - rollouts.yanatech.co.uk
      secretName: wildcard-yanatech-tls
