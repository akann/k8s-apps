apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: tempo
    targetRevision: "*"
    helm:
      valuesObject:
        tempo:
          storage:
            trace:
              backend: local
          retention: 336h  # 14 days
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi

        persistence:
          enabled: true
          storageClassName: ceph-rbd
          size: 20Gi

        serviceMonitor:
          enabled: true
          additionalLabels:
            release: kube-prometheus-stack

        tempo:
          metricsGenerator:
            enabled: true
            remoteWriteUrl: http://kube-prometheus-stack-prometheus.monitoring:9090/api/v1/write

        gateway:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
