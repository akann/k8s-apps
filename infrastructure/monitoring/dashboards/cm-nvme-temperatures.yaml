apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: '1'
  name: grafana-dashboard-nvme-temperatures
  namespace: monitoring
data:
  nvme-temperatures.json: |
    {
      "title": "Proxmox / NVMe Temperatures",
      "uid": "pve-nvme-temp",
      "timezone": "browser",
      "schemaVersion": 37,
      "version": 3,
      "refresh": "1m",
      "time": { "from": "now-3h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "node",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(nvme_temperature_celsius{job=\"pve-node-exporter\"}, node)",
            "multi": true,
            "includeAll": true,
            "current": {},
            "refresh": 2,
            "sort": 1,
            "label": "Node"
          }
        ]
      },
      "panels": [
        {
          "type": "stat",
          "title": "Current Temperatures",
          "id": 1,
          "gridPos": { "h": 5, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "nvme_temperature_celsius{job=\"pve-node-exporter\", node=~\"$node\"}",
              "legendFormat": "{{node}} / {{device}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 70 },
                  { "color": "red", "value": 85 }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "horizontal",
            "textMode": "auto",
            "colorMode": "background"
          }
        },
        {
          "type": "timeseries",
          "title": "Temperature Over Time",
          "id": 2,
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "nvme_temperature_celsius{job=\"pve-node-exporter\", node=~\"$node\"}",
              "legendFormat": "{{node}} — {{device}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "min": 20,
              "max": 90,
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 70 },
                  { "color": "red", "value": 85 }
                ]
              },
              "custom": {
                "thresholdsStyle": { "mode": "line" }
              }
            }
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": ["lastNotNull", "max", "mean"]
            }
          }
        }
      ]
    }
