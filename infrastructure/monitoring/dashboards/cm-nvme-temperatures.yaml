apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: '1'
  name: grafana-dashboard-nvme-temperatures
  namespace: monitoring
data:
  nvme-temperatures.json: |
    {
      "title": "Proxmox / NVMe Temperatures",
      "uid": "pve-nvme-temp",
      "timezone": "browser",
      "schemaVersion": 37,
      "version": 6,
      "tags": ["Proxmox", "Prometheus"],
      "refresh": "1m",
      "time": { "from": "now-3h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "node",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(nvme_temperature_celsius{job=\"pve-node-exporter\"}, node)",
            "multi": true,
            "includeAll": true,
            "current": {},
            "refresh": 2,
            "sort": 1,
            "label": "Node"
          }
        ]
      },
      "panels": [
        {
          "type": "stat",
          "title": "Alert Status",
          "id": 3,
          "gridPos": { "h": 3, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "count(ALERTS{alertname=~\"NVMeTemperature.*\", alertstate=\"firing\"}) or vector(0)",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "All Clear", "color": "green" } } },
                { "type": "range", "options": { "from": 1, "to": 100, "result": { "text": "Firing", "color": "red" } } }
              ],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "color": { "mode": "thresholds" }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "textMode": "auto",
            "graphMode": "none"
          }
        },
        {
          "type": "table",
          "title": "Active Alerts",
          "id": 4,
          "gridPos": { "h": 3, "w": 18, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "ALERTS{alertname=~\"NVMeTemperature.*\", alertstate=\"firing\"}",
              "refId": "A",
              "instant": true,
              "format": "table"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true, "Value": true, "__name__": true,
                  "job": true, "instance": true, "prometheus": true
                },
                "renameByName": {
                  "alertname": "Alert",
                  "alertstate": "State",
                  "node": "Node",
                  "device": "Device",
                  "severity": "Severity"
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": { "displayMode": "auto" }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Severity" },
                "properties": [
                  {
                    "id": "custom.displayMode",
                    "value": "color-background"
                  },
                  {
                    "id": "mappings",
                    "value": [
                      { "type": "value", "options": { "warning": { "color": "orange", "text": "warning" } } },
                      { "type": "value", "options": { "critical": { "color": "red", "text": "critical" } } }
                    ]
                  }
                ]
              }
            ]
          },
          "options": { "footer": { "show": false } }
        },
        {
          "type": "timeseries",
          "title": "Temperature Over Time",
          "id": 2,
          "gridPos": { "h": 20, "w": 24, "x": 0, "y": 3 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "nvme_temperature_celsius{job=\"pve-node-exporter\", node=~\"$node\", device=~\"nvme[0-9]+\"}",
              "legendFormat": "{{node}} — {{device}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "min": 20,
              "max": 90,
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 70 },
                  { "color": "red", "value": 85 }
                ]
              },
              "custom": {
                "thresholdsStyle": { "mode": "line" }
              }
            }
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": ["lastNotNull", "max", "mean"]
            }
          }
        }
      ]
    }
