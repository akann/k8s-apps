data:
  ingress-access-logs.json: "{\n  \"title\": \"Ingress Access Logs\",\n  \"uid\": \"ingress-access-logs\",\n  \"description\": \"Per-host HTTP access logs from ingress-nginx via Loki (JSON log format). Visitor IPs are real client IPs (CF-Connecting-IP trust).\",\n  \"tags\": [\n    \"ingress-nginx\",\n    \"loki\",\n    \"access-logs\"\n  ],\n  \"timezone\": \"browser\",\n  \"schemaVersion\": 39,\n  \"version\": 2,\n  \"refresh\": \"1m\",\n  \"time\": {\n    \"from\": \"now-24h\",\n    \"to\": \"now\"\n  },\n  \"annotations\": {\n    \"list\": []\n  },\n  \"templating\": {\n    \"list\": [\n      {\n        \"name\": \"host\",\n        \"label\": \"Host\",\n        \"type\": \"custom\",\n        \"query\": \"akan.nkweini.org, yanatech.co.uk, stocks.yanatech.co.uk, photos.yanatech.co.uk, cloud.yanatech.co.uk, grafana.yanatech.co.uk, argocd.yanatech.co.uk, harbor.yanatech.co.uk, authentik.yanatech.co.uk, vault.yanatech.co.uk, status.yanatech.co.uk, kafka-ui.yanatech.co.uk, api-gateway.yanatech.co.uk\",\n        \"includeAll\": true,\n        \"allValue\": \".*\",\n        \"multi\": false,\n        \"current\": {\n          \"text\": \"akan.nkweini.org\",\n          \"value\": \"akan.nkweini.org\"\n        },\n        \"options\": []\n      }\n    ]\n  },\n  \"panels\": [\n    {\n      \"id\": 1,\n      \"type\": \"stat\",\n      \"title\": \"Total Requests\",\n      \"gridPos\": {\n        \"x\": 0,\n        \"y\": 0,\n        \"w\": 5,\n        \"h\": 4\n      },\n      \"datasource\": {\n        \"type\": \"loki\",\n        \"uid\": \"loki\"\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"expr\": \"sum(count_over_time({namespace=\\\"ingress-nginx\\\", container=\\\"controller\\\"} | json | __error__=\\\"\\\" | host=~\\\"$host\\\" [$__range]))\",\n          \"queryType\": \"instant\",\n          \"instant\": true,\n          \"range\": false\n        }\n      ],\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"short\",\n          \"color\": {\n            \"mode\": \"fixed\",\n            \"fixedColor\": \"blue\"\n          }\n        },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"graphMode\": \"none\"\n      }\n    },\n    {\n      \"id\": 2,\n      \"type\": \"stat\",\n      \"title\": \"Unique Visitor IPs\",\n      \"gridPos\": {\n        \"x\": 5,\n        \"y\": 0,\n        \"w\": 5,\n        \"h\": 4\n      },\n      \"datasource\": {\n        \"type\": \"loki\",\n        \"uid\": \"loki\"\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"expr\": \"count(sum by (remote_addr) (count_over_time({namespace=\\\"ingress-nginx\\\", container=\\\"controller\\\"} | json | __error__=\\\"\\\" | host=~\\\"$host\\\" [$__range])))\",\n          \"queryType\": \"instant\",\n          \"instant\": true,\n          \"range\": false\n        }\n      ],\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"short\",\n          \"color\": {\n            \"mode\": \"fixed\",\n            \"fixedColor\": \"purple\"\n          }\n        },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"graphMode\": \"none\"\n      }\n    },\n    {\n      \"id\": 3,\n      \"type\": \"stat\",\n      \"title\": \"4xx\",\n      \"gridPos\": {\n        \"x\": 10,\n        \"y\": 0,\n        \"w\": 4,\n        \"h\": 4\n      },\n      \"datasource\": {\n        \"type\": \"loki\",\n        \"uid\": \"loki\"\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"expr\": \"sum(count_over_time({namespace=\\\"ingress-nginx\\\", container=\\\"controller\\\"} | json | __error__=\\\"\\\" | host=~\\\"$host\\\" | status >= 400 | status < 500 [$__range]))\",\n          \"queryType\": \"instant\",\n          \"instant\": true,\n          \"range\": false\n        }\n      ],\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"short\",\n          \"color\": {\n            \"mode\": \"fixed\",\n            \"fixedColor\": \"yellow\"\n          },\n          \"noValue\": \"0\"\n        },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"graphMode\": \"none\"\n      }\n    },\n    {\n      \"id\": 4,\n      \"type\": \"stat\",\n      \"title\": \"5xx\",\n      \"gridPos\": {\n        \"x\": 14,\n        \"y\": 0,\n        \"w\": 4,\n        \"h\": 4\n      },\n      \"datasource\": {\n        \"type\": \"loki\",\n        \"uid\": \"loki\"\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"expr\": \"sum(count_over_time({namespace=\\\"ingress-nginx\\\", container=\\\"controller\\\"} | json | __error__=\\\"\\\" | host=~\\\"$host\\\" | status >= 500 [$__range]))\",\n          \"queryType\": \"instant\",\n          \"instant\": true,\n          \"range\": false\n        }\n      ],\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"short\",\n          \"color\": {\n            \"mode\": \"fixed\",\n            \"fixedColor\": \"red\"\n          },\n          \"noValue\": \"0\"\n        },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"graphMode\": \"none\"\n      }\n    },\n    {\n      \"id\": 5,\n      \"type\": \"stat\",\n      \"title\": \"p95 Latency\",\n      \"gridPos\": {\n        \"x\": 18,\n        \"y\": 0,\n        \"w\": 6,\n        \"h\": 4\n      },\n      \"datasource\": {\n        \"type\": \"loki\",\n        \"uid\": \"loki\"\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"expr\": \"quantile_over_time(0.95, {namespace=\\\"ingress-nginx\\\", container=\\\"controller\\\"} | json | __error__=\\\"\\\" | host=~\\\"$host\\\" | unwrap request_time [$__range]) by ()\",\n          \"queryType\": \"instant\",\n          \"instant\": true,\n          \"range\": false\n        }\n      ],\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"s\",\n          \"color\": {\n            \"mode\": \"fixed\",\n            \"fixedColor\": \"orange\"\n          }\n        },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"graphMode\": \"none\"\n      }\n    },\n    {\n      \"id\": 6,\n      \"type\": \"timeseries\",\n      \"title\": \"Requests by Status Class\",\n      \"gridPos\": {\n        \"x\": 0,\n        \"y\": 4,\n        \"w\": 12,\n        \"h\": 9\n      },\n      \"datasource\": {\n        \"type\": \"loki\",\n        \"uid\": \"loki\"\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"expr\": \"sum(count_over_time({namespace=\\\"ingress-nginx\\\", container=\\\"controller\\\"} | json | __error__=\\\"\\\" | host=~\\\"$host\\\" | status >= 200 | status < 300 [$__auto]))\",\n          \"legendFormat\": \"2xx\"\n        },\n        {\n          \"refId\": \"B\",\n          \"expr\": \"sum(count_over_time({namespace=\\\"ingress-nginx\\\", container=\\\"controller\\\"} | json | __error__=\\\"\\\" | host=~\\\"$host\\\" | status >= 300 | status < 400 [$__auto]))\",\n          \"legendFormat\": \"3xx\"\n        },\n        {\n          \"refId\": \"C\",\n          \"expr\": \"sum(count_over_time({namespace=\\\"ingress-nginx\\\", container=\\\"controller\\\"} | json | __error__=\\\"\\\" | host=~\\\"$host\\\" | status >= 400 | status < 500 [$__auto]))\",\n          \"legendFormat\": \"4xx\"\n        },\n        {\n          \"refId\": \"D\",\n          \"expr\": \"sum(count_over_time({namespace=\\\"ingress-nginx\\\", container=\\\"controller\\\"} | json | __error__=\\\"\\\" | host=~\\\"$host\\\" | status >= 500 [$__auto]))\",\n          \"legendFormat\": \"5xx\"\n        }\n      ],\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"short\",\n          \"custom\": {\n            \"drawStyle\": \"bars\",\n            \"fillOpacity\": 70,\n            \"stacking\": {\n              \"mode\": \"normal\"\n            },\n            \"lineWidth\": 0\n          }\n        },\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"2xx\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"green\"\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"3xx\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"blue\"\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"4xx\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"yellow\"\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"5xx\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"color\",\n                \"value\": {\n \
    \                 \"mode\": \"fixed\",\n                  \"fixedColor\": \"red\"\n                }\n              }\n            ]\n          }\n        ]\n      },\n      \"options\": {\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        },\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        }\n      }\n    },\n    {\n      \"id\": 7,\n      \"type\": \"timeseries\",\n      \"title\": \"Latency Percentiles\",\n      \"gridPos\": {\n        \"x\": 12,\n        \"y\": 4,\n        \"w\": 12,\n        \"h\": 9\n      },\n      \"datasource\": {\n        \"type\": \"loki\",\n        \"uid\": \"loki\"\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"expr\": \"quantile_over_time(0.50, {namespace=\\\"ingress-nginx\\\", container=\\\"controller\\\"} | json | __error__=\\\"\\\" | host=~\\\"$host\\\" | unwrap request_time [$__auto]) by ()\",\n          \"legendFormat\": \"p50\"\n        },\n        {\n          \"refId\": \"B\",\n          \"expr\": \"quantile_over_time(0.95, {namespace=\\\"ingress-nginx\\\", container=\\\"controller\\\"} | json | __error__=\\\"\\\" | host=~\\\"$host\\\" | unwrap request_time [$__auto]) by ()\",\n          \"legendFormat\": \"p95\"\n        },\n        {\n          \"refId\": \"C\",\n          \"expr\": \"quantile_over_time(0.99, {namespace=\\\"ingress-nginx\\\", container=\\\"controller\\\"} | json | __error__=\\\"\\\" | host=~\\\"$host\\\" | unwrap request_time [$__auto]) by ()\",\n          \"legendFormat\": \"p99\"\n        }\n      ],\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"s\",\n          \"custom\": {\n            \"fillOpacity\": 10\n          }\n        },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        },\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        }\n      }\n    },\n    {\n      \"id\": 8,\n      \"type\": \"bargauge\",\n      \"title\": \"Top 10 Visitor IPs\",\n      \"gridPos\": {\n        \"x\": 0,\n        \"y\": 13,\n        \"w\": 8,\n        \"h\": 9\n      },\n      \"datasource\": {\n        \"type\": \"loki\",\n        \"uid\": \"loki\"\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"expr\": \"topk(10, sum by (remote_addr) (count_over_time({namespace=\\\"ingress-nginx\\\", container=\\\"controller\\\"} | json | __error__=\\\"\\\" | host=~\\\"$host\\\" [$__range])))\",\n          \"legendFormat\": \"{{remote_addr}}\",\n          \"queryType\": \"instant\",\n          \"instant\": true,\n          \"range\": false\n        }\n      ],\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"short\",\n          \"color\": {\n            \"mode\": \"continuous-BlPu\"\n          }\n        },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"orientation\": \"horizontal\",\n        \"displayMode\": \"gradient\",\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"showUnfilled\": true\n      }\n    },\n    {\n      \"id\": 9,\n      \"type\": \"bargauge\",\n      \"title\": \"Top 10 Paths\",\n      \"gridPos\": {\n        \"x\": 8,\n        \"y\": 13,\n        \"w\": 8,\n        \"h\": 9\n      },\n      \"datasource\": {\n        \"type\": \"loki\",\n        \"uid\": \"loki\"\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"expr\": \"topk(10, sum by (uri) (count_over_time({namespace=\\\"ingress-nginx\\\", container=\\\"controller\\\"} | json | __error__=\\\"\\\" | host=~\\\"$host\\\" [$__range])))\",\n          \"legendFormat\": \"{{uri}}\",\n          \"queryType\": \"instant\",\n          \"instant\": true,\n          \"range\": false\n        }\n      ],\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"short\",\n          \"color\": {\n            \"mode\": \"continuous-GrYlRd\"\n          }\n        },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"orientation\": \"horizontal\",\n        \"displayMode\": \"gradient\",\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"showUnfilled\": true\n      }\n    },\n    {\n      \"id\": 10,\n      \"type\": \"bargauge\",\n      \"title\": \"Top 10 User Agents\",\n      \"gridPos\": {\n        \"x\": 16,\n        \"y\": 13,\n        \"w\": 8,\n        \"h\": 9\n      },\n      \"datasource\": {\n        \"type\": \"loki\",\n        \"uid\": \"loki\"\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"expr\": \"topk(10, sum by (user_agent) (count_over_time({namespace=\\\"ingress-nginx\\\", container=\\\"controller\\\"} | json | __error__=\\\"\\\" | host=~\\\"$host\\\" [$__range])))\",\n          \"legendFormat\": \"{{user_agent}}\",\n          \"queryType\": \"instant\",\n          \"instant\": true,\n          \"range\": false\n        }\n      ],\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"short\",\n          \"color\": {\n            \"mode\": \"continuous-BlYlRd\"\n          }\n        },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"orientation\": \"horizontal\",\n        \"displayMode\": \"gradient\",\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"showUnfilled\": true\n      }\n    },\n    {\n      \"id\": 11,\n      \"type\": \"logs\",\n      \"title\": \"Access Log Tail\",\n      \"gridPos\": {\n        \"x\": 0,\n        \"y\": 31,\n        \"w\": 24,\n        \"h\": 11\n      },\n      \"datasource\": {\n        \"type\": \"loki\",\n        \"uid\": \"loki\"\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"expr\": \"{namespace=\\\"ingress-nginx\\\", container=\\\"controller\\\"} | json | __error__=\\\"\\\" | host=~\\\"$host\\\" | line_format \\\"{{.remote_addr}} [{{if .country}}{{.country}}{{else}}--{{end}}] \\u2192 {{.status}} {{.method}} {{.host}}{{.uri}} ({{.request_time}}s) {{.user_agent}}\\\"\"\n        }\n      ],\n      \"options\": {\n        \"showTime\": true,\n        \"sortOrder\": \"Descending\",\n        \"wrapLogMessage\": true,\n        \"enableLogDetails\": true,\n        \"dedupStrategy\": \"none\"\n      }\n    },\n    {\n      \"id\": 12,\n      \"type\": \"bargauge\",\n      \"title\": \"Requests by Country\",\n      \"gridPos\": {\n        \"x\": 0,\n        \"y\": 22,\n        \"w\": 8,\n        \"h\": 9\n      },\n      \"datasource\": {\n        \"type\": \"loki\",\n        \"uid\": \"loki\"\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"expr\": \"topk(15, sum by (country) (count_over_time({namespace=\\\"ingress-nginx\\\", container=\\\"controller\\\"} | json | __error__=\\\"\\\" | host=~\\\"$host\\\" [$__range])))\",\n          \"legendFormat\": \"{{country}}\",\n          \"queryType\": \"instant\",\n          \"instant\": true,\n          \"range\": false\n        }\n      ],\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"short\",\n          \"color\": {\n            \"mode\": \"continuous-GrYlRd\"\n          },\n          \"noValue\": \"no data\"\n        },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"orientation\": \"horizontal\",\n        \"displayMode\": \"gradient\",\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"showUnfilled\": true\n      }\n    },\n    {\n      \"id\": 13,\n      \"type\": \"table\",\n      \"title\": \"Visitor IPs\",\n      \"gridPos\": {\n        \"x\": 8,\n        \"y\": 22,\n        \"w\": 16,\n        \"h\": 9\n      },\n      \"datasource\": {\n        \"type\": \"loki\",\n        \"uid\": \"loki\"\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"expr\": \"topk(100, sum by (remote_addr, country) (count_over_time({namespace=\\\"ingress-nginx\\\", container=\\\"controller\\\"} | json | __error__=\\\"\\\" | host=~\\\"$host\\\" [$__range])))\",\n          \"queryType\": \"instant\",\n          \"instant\": true,\n          \"range\": false\n        }\n      ],\n      \"transformations\": [\n        {\n          \"id\": \"labelsToFields\",\n          \"options\": {}\n        },\n        {\n          \"id\": \"merge\",\n          \"options\": {}\n        },\n        {\n          \"id\": \"organize\",\n          \"options\": {\n            \"excludeByName\": {\n              \"Time\": true\n            },\n            \"renameByName\": {\n              \"remote_addr\": \"IP address\",\n              \"country\": \"Country\",\n              \"Value\": \"Requests\"\n            },\n            \"indexByName\": {\n              \"remote_addr\": 0,\n              \"country\": 1\n            }\n          }\n        }\n      ],\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"custom\": {\n            \"align\": \"left\",\n            \"filterable\": true\n          }\n        },\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Requests\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.cellOptions\",\n                \"value\": {\n                  \"type\": \"gauge\",\n                  \"mode\": \"gradient\"\n                }\n              },\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"continuous-BlPu\"\n                }\n              }\n            ]\n          }\n        ]\n      },\n      \"options\": {\n        \"sortBy\": [\n          {\n            \"displayName\": \"Requests\",\n            \"desc\"\
    : true\n          }\n        ],\n        \"footer\": {\n          \"show\": false\n        }\n      }\n    }\n  ]\n}"
