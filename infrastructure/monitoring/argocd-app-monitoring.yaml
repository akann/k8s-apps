apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 72.6.2
    helm:
      releaseName: kube-prometheus-stack
      values: |
        grafana:
          enabled: true
          adminPassword: ""  # managed via grafana-authentik-secret
          env:
            GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
            GF_AUTH_GENERIC_OAUTH_NAME: Authentik
            GF_AUTH_GENERIC_OAUTH_SCOPES: openid profile email groups
            GF_AUTH_GENERIC_OAUTH_AUTH_URL: https://auth.yanatech.co.uk/application/o/authorize/
            GF_AUTH_GENERIC_OAUTH_TOKEN_URL: https://auth.yanatech.co.uk/application/o/token/
            GF_AUTH_GENERIC_OAUTH_API_URL: https://auth.yanatech.co.uk/application/o/userinfo/
            GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(groups, 'authentik Admins') && 'Admin' || 'Viewer'"
            GF_SERVER_ROOT_URL: https://grafana.yanatech.co.uk
          envValueFrom:
            GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
              secretKeyRef:
                name: grafana-authentik-secret
                key: client_id
            GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
              secretKeyRef:
                name: grafana-authentik-secret
                key: client_secret
          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki.monitoring.svc.cluster.local:3100
              access: proxy
              isDefault: false
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - grafana.yanatech.co.uk
            tls:
              - hosts:
                  - grafana.yanatech.co.uk
                secretName: wildcard-yanatech-tls
        prometheus:
          prometheusSpec:
            serviceMonitorSelector:
              matchLabels:
                release: kube-prometheus-stack
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: ceph-rbd
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 50Gi
        alertmanager:
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ['alertname', 'namespace']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: gotify
              routes:
                - matchers:
                    - alertname =~ "Watchdog|InfoInhibitor"
                  receiver: "null"
            receivers:
              - name: "null"
              - name: gotify
                webhook_configs:
                  - url: 'http://alertmanager-gotify-bridge.gotify.svc.cluster.local'
                    send_resolved: true
            inhibit_rules:
              - source_matchers:
                  - severity = critical
                target_matchers:
                  - severity =~ warning|info
                equal:
                  - namespace
                  - alertname
              - source_matchers:
                  - severity = warning
                target_matchers:
                  - severity = info
                equal:
                  - namespace
                  - alertname
          alertmanagerSpec:
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: ceph-rbd
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 10Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
