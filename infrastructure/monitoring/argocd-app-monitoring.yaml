apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 87.3.0
    helm:
      releaseName: kube-prometheus-stack
      values: |
        crds:
          upgradeJob:
            enabled: true
        grafana:
          enabled: true
          adminPassword: ""  # managed via grafana-authentik-secret
          env:
            GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
            GF_AUTH_GENERIC_OAUTH_NAME: Authentik
            GF_AUTH_GENERIC_OAUTH_SCOPES: openid profile email profiles
            GF_AUTH_GENERIC_OAUTH_AUTH_URL: https://authentik.yanatech.co.uk/application/o/authorize/
            GF_AUTH_GENERIC_OAUTH_TOKEN_URL: https://authentik.yanatech.co.uk/application/o/token/
            GF_AUTH_GENERIC_OAUTH_API_URL: https://authentik.yanatech.co.uk/application/o/userinfo/
            GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(groups, 'authentik Admins') && 'Admin' || 'Viewer'"
            GF_SERVER_ROOT_URL: https://grafana.yanatech.co.uk
            GF_SMTP_ENABLED: "true"
            GF_SMTP_HOST: "mail-eu.smtp2go.com:2525"
            GF_SMTP_FROM_NAME: "Grafana | YanaTech"
            GF_SMTP_STARTTLS_POLICY: MandatoryStartTLS
          envValueFrom:
            GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
              secretKeyRef:
                name: grafana-authentik-secret
                key: client_id
            GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
              secretKeyRef:
                name: grafana-authentik-secret
                key: client_secret
            GF_SMTP_USER:
              secretKeyRef:
                name: grafana-smtp-secret
                key: smtp_username
            GF_SMTP_PASSWORD:
              secretKeyRef:
                name: grafana-smtp-secret
                key: smtp_password
            GF_SMTP_FROM_ADDRESS:
              secretKeyRef:
                name: grafana-smtp-secret
                key: smtp_from
            GRAFANA_PG_PASSWORD:
              secretKeyRef:
                name: grafana-pg-secret
                key: password
          plugins:
            - yesoreyeram-infinity-datasource
          additionalDataSources:
            - name: PostgreSQL (auth-service)
              type: postgres
              url: auth-service-pg-rw.yana-stocks.svc.cluster.local:5432
              user: app
              jsonData:
                database: app
                sslmode: require
                postgresVersion: 1600
              secureJsonData:
                password: $GRAFANA_PG_PASSWORD
            - name: Alertmanager
              type: alertmanager
              url: http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093
              access: proxy
              jsonData:
                implementation: prometheus
            - name: Infinity
              type: yesoreyeram-infinity-datasource
              access: proxy
            - name: Loki
              type: loki
              url: http://loki.monitoring.svc.cluster.local:3100
              access: proxy
              isDefault: false
            - name: Tempo
              type: tempo
              url: http://tempo.monitoring.svc.cluster.local:3200
              access: proxy
              isDefault: false
              jsonData:
                httpMethod: GET
                serviceMap:
                  datasourceUid: prometheus
                nodeGraph:
                  enabled: true
                lokiSearch:
                  datasourceUid: loki
                tracesToLogsV2:
                  datasourceUid: loki
                  spanStartTimeShift: "-1h"
                  spanEndTimeShift: "1h"
                  filterByTraceID: true
                  filterBySpanID: false
                tracesToMetrics:
                  datasourceUid: prometheus
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - grafana.yanatech.co.uk
            tls:
              - hosts:
                  - grafana.yanatech.co.uk
                secretName: wildcard-yanatech-tls
        prometheus:
          prometheusSpec:
            serviceMonitorSelector:
              matchLabels:
                release: kube-prometheus-stack
            additionalScrapeConfigs:
              - job_name: ceph
                static_configs:
                  - targets:
                      - 192.168.22.11:9283
                      - 192.168.22.12:9283
                      - 192.168.22.13:9283
                relabel_configs:
                  - source_labels: [__address__]
                    target_label: instance
              - job_name: pve-node-exporter
                static_configs:
                  - targets: ["192.168.22.11:9100"]
                    labels: {node: pve1}
                  - targets: ["192.168.22.12:9100"]
                    labels: {node: pve2}
                  - targets: ["192.168.22.13:9100"]
                    labels: {node: pve3}
                relabel_configs:
                  - source_labels: [__address__]
                    target_label: instance
              - job_name: pve-exporter
                metrics_path: /pve
                params:
                  target: [localhost]
                static_configs:
                  - targets: ["192.168.22.11:9221"]
                    labels: {node: pve1}
                  - targets: ["192.168.22.12:9221"]
                    labels: {node: pve2}
                  - targets: ["192.168.22.13:9221"]
                    labels: {node: pve3}
                relabel_configs:
                  - source_labels: [__address__]
                    target_label: instance
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: ceph-rbd
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 50Gi
        alertmanager:
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ['alertname', 'namespace']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: gotify
              routes:
                - matchers:
                    - alertname =~ "Watchdog|InfoInhibitor"
                  receiver: "null"
                - matchers:
                    - severity = critical
                  receiver: critical-alerts
            receivers:
              - name: "null"
              - name: gotify
                webhook_configs:
                  - url: 'http://alertmanager-gotify-bridge.gotify.svc.cluster.local/gotify_webhook'
                    send_resolved: true
              - name: critical-alerts
                webhook_configs:
                  - url: 'http://alertmanager-gotify-bridge.gotify.svc.cluster.local/gotify_webhook'
                    send_resolved: true
            inhibit_rules:
              - source_matchers:
                  - severity = critical
                target_matchers:
                  - severity =~ warning|info
                equal:
                  - namespace
                  - alertname
              - source_matchers:
                  - severity = warning
                target_matchers:
                  - severity = info
                equal:
                  - namespace
                  - alertname
          alertmanagerSpec:
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: ceph-rbd
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 10Gi
  ignoreDifferences:
    - group: monitoring.coreos.com
      kind: Prometheus
      name: kube-prometheus-stack-prometheus
      jqPathExpressions:
        - .spec.affinity
        - .spec.automountServiceAccountToken
        - .spec.enableOTLPReceiver
        - .spec.hostNetwork
        - .spec.imagePullPolicy
        - .spec.podMonitorNamespaceSelector
        - .spec.podMonitorSelector
        - .spec.probeNamespaceSelector
        - .spec.probeSelector
        - .spec.scrapeConfigNamespaceSelector
        - .spec.scrapeConfigSelector
        - .spec.serviceMonitorNamespaceSelector
        - .spec.shards
        - .spec.storage
    - group: ""
      kind: Secret
      managedFieldsManagers:
        - helm
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
