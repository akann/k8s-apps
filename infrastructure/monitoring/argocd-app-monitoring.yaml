apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "*"
    helm:
      releaseName: kube-prometheus-stack
      values: |
        alertmanager:
          alertmanagerSpec:
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: ceph-rbd
                  resources:
                    requests:
                      storage: 5Gi
        grafana:
          adminPassword: changeme
          env:
            GF_SERVER_ROOT_URL: "https://grafana.yanatech.co.uk"
            GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
            GF_AUTH_GENERIC_OAUTH_NAME: "Authentik"
            GF_AUTH_GENERIC_OAUTH_ICON: "signin"
            GF_AUTH_GENERIC_OAUTH_SCOPES: "openid email profile"
            GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://auth.yanatech.co.uk/application/o/authorize/"
            GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "https://auth.yanatech.co.uk/application/o/token/"
            GF_AUTH_GENERIC_OAUTH_API_URL: "https://auth.yanatech.co.uk/application/o/userinfo/"
            GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(groups, 'authentik Admins') && 'Admin' || 'Viewer'"
            GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
            GF_AUTH_GENERIC_OAUTH_USE_PKCE: "true"
            GF_AUTH_SIGNOUT_REDIRECT_URL: "https://auth.yanatech.co.uk/application/o/grafana/end-session/"
          envValueFrom:
            GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
              secretKeyRef:
                name: grafana-authentik-secret
                key: client_id
            GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
              secretKeyRef:
                name: grafana-authentik-secret
                key: client_secret
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - grafana.yanatech.co.uk
            tls:
              - hosts:
                  - grafana.yanatech.co.uk
                secretName: wildcard-yanatech-tls
        prometheus:
          prometheusSpec:
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: ceph-rbd
                  resources:
                    requests:
                      storage: 20Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/conversion/webhook/clientConfig/caBundle
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
