grafana:
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - grafana.yanatech.co.uk
    tls:
      - secretName: wildcard-yanatech-tls
        hosts:
          - grafana.yanatech.co.uk
  # Set admin password at install time:
  # helm install ... --set grafana.adminPassword=<password>
  adminPassword: ""
  persistence:
    enabled: true
    storageClassName: ceph-rbd
    size: 10Gi

prometheus:
  prometheusSpec:
    retention: 30d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: ceph-rbd
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 50Gi

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: ceph-rbd
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
