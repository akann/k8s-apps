apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: goldilocks-outpost
  namespace: goldilocks
spec:
  ingressClassName: nginx
  rules:
    - host: goldilocks.yanatech.co.uk
      http:
        paths:
          - path: /outpost.goauthentik.io
            pathType: Prefix
            backend:
              service:
                name: ak-outpost-authentik-embedded-outpost
                port:
                  number: 9000
  tls:
    - secretName: wildcard-yanatech-tls
      hosts:
        - goldilocks.yanatech.co.uk
---
apiVersion: v1
kind: Service
metadata:
  name: ak-outpost-authentik-embedded-outpost
  namespace: goldilocks
spec:
  type: ExternalName
  externalName: ak-outpost-authentik-embedded-outpost.authentik.svc.cluster.local
  ports:
    - port: 9000
