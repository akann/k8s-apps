apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: descheduler
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/descheduler/
    chart: descheduler
    targetRevision: 0.36.0
    helm:
      releaseName: descheduler
      valuesObject:
        schedule: "*/5 * * * *"
        deschedulerPolicy:
          profiles:
            - name: default
              pluginConfig:
                - name: DefaultEvictor
                  args:
                    ignorePvcPods: true
                    evictLocalStoragePods: false
              plugins:
                balance:
                  enabled:
                    - RemovePodsViolatingTopologySpreadConstraints
                    - LowNodeUtilization
                deschedule:
                  enabled:
                    - RemovePodsViolatingNodeAffinity
                    - RemovePodsViolatingInterPodAntiAffinity
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
