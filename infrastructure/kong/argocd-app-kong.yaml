apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kong
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://charts.konghq.com
    chart: ingress
    targetRevision: 0.24.0
    helm:
      releaseName: kong
      valuesObject:
        gateway:
          enabled: true
          ingressController:
            installCRDs: false
          env:
            role: traditional
            database: "off"
          proxy:
            enabled: true
            type: LoadBalancer
            annotations:
              metallb.universe.tf/loadBalancerIPs: 192.168.33.202
            http:
              enabled: true
              servicePort: 80
              containerPort: 8000
            tls:
              enabled: false  # TLS terminated at ingress-nginx
          admin:
            enabled: true
            type: ClusterIP
            clusterIP: None
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        controller:
          enabled: true
          ingressController:
            enabled: true
            installCRDs: false
            gatewayDiscovery:
              enabled: true
              generateAdminApiService: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: kong
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: kong-controller-kong-validations
      jsonPointers:
        - /webhooks/2/timeoutSeconds
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
