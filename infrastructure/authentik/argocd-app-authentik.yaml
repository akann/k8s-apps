apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.goauthentik.io
    chart: authentik
    targetRevision: "*"
    helm:
      values: |
        authentik:
          existingSecret:
            secretName: authentik-secret
        postgresql:
          enabled: false
        redis:
          enabled: true
          master:
            persistence:
              storageClass: ceph-rbd
        server:
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - authentik.yanatech.co.uk
            tls:
              - hosts:
                  - authentik.yanatech.co.uk
                secretName: wildcard-yanatech-tls
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
