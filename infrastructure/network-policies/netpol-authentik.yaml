---
# authentik: SSO provider — needs wide ingress (all apps redirect here) + egress to CNPG
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: authentik
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-nginx
  namespace: authentik
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 9000
        - port: 9443
---
# Outpost pods serve forward auth — ingress from all namespaces (via ExternalName svc)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-outpost-ingress
  namespace: authentik
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/managed-by: goauthentik.io
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 9000
        - port: 9443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: authentik
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9300
        - port: 9000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress
  namespace: authentik
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-clusters
      ports:
        - port: 5432
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 443  # LDAP/email/external integrations
        - port: 6443
    - ports:
        - port: 2525  # SMTP2GO STARTTLS
        - port: 465   # SMTP2GO SSL
