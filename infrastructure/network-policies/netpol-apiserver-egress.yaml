---
# allow-kube-apiserver-egress: applied to all namespaces whose pods talk to kube-apiserver
# (operators, controllers, agents). Without this, default-deny-all blocks apiserver calls.
# Port 443 = kube-apiserver ClusterIP (10.96.0.1), Port 6443 = direct apiserver endpoint.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kube-apiserver-egress
  namespace: cert-manager
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
        - port: 6443
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
