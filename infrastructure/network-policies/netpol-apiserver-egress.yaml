---
# k8s-docs: the CNPG instance manager (k8s-docs-pg pods) watches the Cluster CR
# via the apiserver. Without this, failover/promotion silently deadlocks once the
# instance manager's pre-policy API connections die (e.g. after a control-plane
# reboot) — the namespace's allow-egress only covers 443, apiserver is 6443.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kube-apiserver-egress
  namespace: k8s-docs
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
        - port: 6443
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# dove-house-tt: the CNPG instance manager (dove-house-tt-pg pods) watches the
# Cluster CR via the apiserver — same as k8s-docs above. initdb hangs on
# "waiting for the API server to be reachable" without this.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kube-apiserver-egress
  namespace: dove-house-tt
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
        - port: 6443
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# dove-house-tt-stg: same reason as dove-house-tt above, for the staging
# CNPG instance manager (dove-house-tt-stg-pg pods).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kube-apiserver-egress
  namespace: dove-house-tt-stg
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
        - port: 6443
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# ops-agent: the app itself (not an operator/controller) calls the Kubernetes
# API directly via the kubernetes Python client (cluster-inspector's
# list_pods/get_deployment/list_events/list_nodes, remediate's
# restart_pod/cordon_node). Missing this was the actual root cause of a
# ~9-minute hang on any question touching cluster state — netpol-apps.yaml's
# own allow-egress only covers port 443 generically, which per the note atop
# this file does not resolve Cilium's kube-apiserver entity in native routing
# mode; confirmed by reproducing the exact hang (urllib3 ConnectTimeoutError
# to 10.96.0.1:443 after 542s) from inside the pod before adding this.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kube-apiserver-egress
  namespace: ops-agent
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
        - port: 6443
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# akan: the CNPG instance manager (akan-pg pods) watches the Cluster CR via
# the apiserver — same reason as k8s-docs/dove-house-tt above. initdb hangs
# on "waiting for the API server to be reachable" without this.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kube-apiserver-egress
