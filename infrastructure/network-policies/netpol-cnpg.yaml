---
# cnpg-system: CloudNativePG operator
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: cnpg-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cnpg-operator
  namespace: cnpg-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8080  # metrics
        - port: 9443  # webhook
  egress:
    - {} # operator manages CNPG clusters across namespaces
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: cnpg-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
---
# cnpg-clusters: pg-main cluster (3 instances)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: cnpg-clusters
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# PostgreSQL — accept connections from all app namespaces
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-clients
  namespace: cnpg-clusters
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: pg-main
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vaultwarden
      ports:
        - port: 5432
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: authentik
      ports:
        - port: 5432
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nextcloud
      ports:
        - port: 5432
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infisical
      ports:
        - port: 5432
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: pgadmin
      ports:
        - port: 5432
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: harbor
      ports:
        - port: 5432
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: apicurio
      ports:
        - port: 5432
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: immich
      ports:
        - port: 5432
---
# CNPG streaming replication between instances
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-replication
  namespace: cnpg-clusters
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: pg-main
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: pg-main
      ports:
        - port: 5432
  egress:
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: pg-main
      ports:
        - port: 5432
---
# CNPG Barman WAL archiving — egress to Backblaze B2
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-barman-egress
  namespace: cnpg-clusters
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: pg-main
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443  # Backblaze B2 S3 endpoint
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Monitoring scrape (CNPG exposes metrics on 9187)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: cnpg-clusters
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9187
