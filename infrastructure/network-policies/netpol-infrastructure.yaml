spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 9000  # S3 API
        - port: 9001  # Console
    - from:
        - namespaceSelector: {}  # all namespaces — shared cluster-wide
      ports:
        - port: 9000  # S3 API access from services
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9000  # metrics
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kube-apiserver-egress
  namespace: minio
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
        - port: 6443
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
